// ── ShareCard ─────────────────────────────────────────────────────────────────
function ShareCard({supplements,profile,logs,onClose}){
  const canvasRef=useRef(null);
  const [sharing,setSharing]=useState(false);
  const [showPhoto,setShowPhoto]=useState(true);
  const hasPhoto=!!(profile?.photo);

  const streak=(()=>{
    const todayStr=localISO(new Date());
    const logDates=new Set(logs.map(l=>toISODate(l.date)||toISODate(l.ts)).filter(Boolean));
    // Start from today or yesterday depending on whether today has been logged
    const startFrom=logDates.has(todayStr)?todayStr:(()=>{const d=new Date();d.setDate(d.getDate()-1);return localISO(d);})();
    let s=0,cur=new Date(startFrom+"T00:00:00");
    while(true){const iso=localISO(cur);if(!logDates.has(iso))break;s++;cur.setDate(cur.getDate()-1);}
    return s;
  })();

  const daysOnStack=(()=>{
    if(!logs.length)return 0;
    const first=new Date(Math.min(...logs.map(l=>l.ts)));
    return Math.max(1,Math.round((new Date()-first)/86400000));
  })();

  const drawCard=(photoImg)=>{
    const rr=(ctx,x,y,w,h,r)=>{ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();};
    const canvas=canvasRef.current;
    if(!canvas)return;
    const SCALE=2;
    const W=canvas.width=1080*SCALE;
    const H=canvas.height=1920*SCALE;
    const ctx=canvas.getContext("2d");
    ctx.setTransform(1,0,0,1,0,0);
    ctx.scale(SCALE,SCALE);
    const RW=1080,RH=1920;

    // ── Background ──
    const bg=ctx.createLinearGradient(0,0,0,RH);
    bg.addColorStop(0,"#080B0F");bg.addColorStop(0.55,"#0C1622");bg.addColorStop(1,"#060A0D");
    ctx.fillStyle=bg;ctx.fillRect(0,0,RW,RH);

    // Diagonal texture lines
    ctx.save();
    const dl=ctx.createLinearGradient(0,0,RW,RH);
    dl.addColorStop(0,"rgba(232,168,48,0)");dl.addColorStop(0.5,"rgba(232,168,48,0.035)");dl.addColorStop(1,"rgba(232,168,48,0)");
    ctx.strokeStyle=dl;
    [[RW*1.5,-80,-RW*0.3,RH+80,220],[RW*1.8,-80,RW*0.05,RH+80,90]].forEach(([x1,y1,x2,y2,w])=>{
      ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    });
    ctx.restore();

    // Top gold rule
    const tl=ctx.createLinearGradient(0,0,RW,0);
    tl.addColorStop(0,"rgba(232,168,48,0)");tl.addColorStop(0.15,"rgba(232,168,48,0.85)");tl.addColorStop(0.85,"rgba(232,168,48,0.85)");tl.addColorStop(1,"rgba(232,168,48,0)");
    ctx.strokeStyle=tl;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,2);ctx.lineTo(RW,2);ctx.stroke();

    // ── Wordmark ──
    ctx.font="700 26px 'Barlow Condensed',sans-serif";
    ctx.letterSpacing="10px";ctx.fillStyle="rgba(232,168,48,0.5)";
    ctx.fillText("SUPPSTACKD",72,76);

    let cursorY=140;

    // ── Profile photo block (conditional) ──
    if(photoImg&&showPhoto){
      const PR=120;const PX=RW/2;const PY=cursorY+PR;
      ctx.save();ctx.beginPath();ctx.arc(PX,PY,PR,0,Math.PI*2);ctx.clip();
      ctx.drawImage(photoImg,PX-PR,PY-PR,PR*2,PR*2);ctx.restore();
      ctx.strokeStyle="#E8A830";ctx.lineWidth=4;
      ctx.beginPath();ctx.arc(PX,PY,PR+4,0,Math.PI*2);ctx.stroke();
      cursorY=PY+PR+60;
    }

    // ── Name ──
    const nameRaw=(profile?.name||"My Stack").toUpperCase();
    ctx.font="900 88px 'Barlow Condensed',sans-serif";ctx.letterSpacing="-1px";ctx.textAlign="center";
    const rawW=ctx.measureText(nameRaw).width;
    const maxW=RW-144;
    if(rawW>maxW){ctx.save();ctx.translate(RW/2,cursorY);ctx.scale(maxW/rawW,1);ctx.fillStyle="#F0F0F0";ctx.fillText(nameRaw,0,0);ctx.restore();}
    else{ctx.fillStyle="#F0F0F0";ctx.fillText(nameRaw,RW/2,cursorY);}
    cursorY+=16;

    const drawnW=Math.min(rawW,maxW);
    const ul=ctx.createLinearGradient(RW/2-drawnW/2,0,RW/2+drawnW/2,0);
    ul.addColorStop(0,"rgba(232,168,48,0)");ul.addColorStop(0.25,"#E8A830");ul.addColorStop(0.75,"#E8A830");ul.addColorStop(1,"rgba(232,168,48,0)");
    ctx.strokeStyle=ul;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(RW/2-drawnW/2,cursorY);ctx.lineTo(RW/2+drawnW/2,cursorY);ctx.stroke();
    cursorY+=64;

    // ── Stats row ──
    const stats=[{label:"DAY STREAK",value:`${streak}`},{label:"DAYS ON STACK",value:`${daysOnStack}`},{label:"SUPPLEMENTS",value:`${supplements.length}`}];
    const statColW=(RW-144)/3;
    stats.forEach((s,i)=>{
      const x=72+(i*statColW);const sw=statColW-16;
      ctx.fillStyle="rgba(255,255,255,0.04)";rr(ctx,x,cursorY,sw,140,12);ctx.fill();
      ctx.strokeStyle="rgba(232,168,48,0.22)";ctx.lineWidth=1.5;rr(ctx,x,cursorY,sw,140,12);ctx.stroke();
      ctx.font="900 64px 'Barlow Condensed',sans-serif";ctx.letterSpacing="-1px";ctx.textAlign="center";
      ctx.fillStyle="#E8A830";ctx.fillText(s.value,x+sw/2,cursorY+86);
      ctx.font="400 20px 'Space Mono',monospace";ctx.letterSpacing="1.5px";ctx.textAlign="center";
      ctx.fillStyle="rgba(255,255,255,0.3)";ctx.fillText(s.label,x+sw/2,cursorY+122);
    });
    ctx.textAlign="left";ctx.letterSpacing="0px";
    cursorY+=172;

    // ── Divider ──
    ctx.strokeStyle="rgba(255,255,255,0.07)";ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(72,cursorY);ctx.lineTo(RW-72,cursorY);ctx.stroke();
    cursorY+=44;

    ctx.font="400 20px 'Space Mono',monospace";ctx.letterSpacing="4px";
    ctx.fillStyle="rgba(232,168,48,0.55)";ctx.fillText("MY STACK",72,cursorY);
    cursorY+=44;

    // ── Supplement pills ──
    let px=72,py=cursorY;
    const pillH=62,pillPad=26,gap=10;
    ctx.font="700 24px 'Barlow Condensed',sans-serif";ctx.letterSpacing="1px";
    const maxPillY=RH-220;
    supplements.slice(0,14).forEach(s=>{
      const label=s.name.toUpperCase();
      const tw=ctx.measureText(label).width;
      const pw=tw+(pillPad*2);
      if(px+pw>RW-72){px=72;py+=pillH+gap;}
      if(py+pillH>maxPillY)return;
      ctx.fillStyle="rgba(255,255,255,0.05)";rr(ctx,px,py,pw,pillH,8);ctx.fill();
      ctx.strokeStyle="rgba(232,168,48,0.32)";ctx.lineWidth=1.5;rr(ctx,px,py,pw,pillH,8);ctx.stroke();
      ctx.fillStyle="#E8E8E8";ctx.font="700 24px 'Barlow Condensed',sans-serif";ctx.letterSpacing="1px";
      ctx.fillText(label,px+pillPad,py+pillH/2+9);
      px+=pw+gap;
    });
    if(supplements.length>14){
      ctx.fillStyle="rgba(255,255,255,0.22)";ctx.font="400 20px 'Space Mono',monospace";ctx.letterSpacing="0px";
      const moreX=px>RW-200?72:px;const moreY=py+pillH/2+7;
      if(moreY<maxPillY)ctx.fillText(`+${supplements.length-14} more`,moreX,moreY);
    }

    // ── Footer ──
    const footY=RH-120;
    ctx.strokeStyle="rgba(255,255,255,0.06)";ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(72,footY-28);ctx.lineTo(RW-72,footY-28);ctx.stroke();

    const part1="KNOW YOUR ";const part2="STACK.";
    ctx.font="800 56px 'Barlow Condensed',sans-serif";ctx.letterSpacing="4px";
    const p1W=ctx.measureText(part1).width;
    const p2W=ctx.measureText(part2).width;
    const startX=RW/2-(p1W+p2W)/2;
    ctx.textAlign="left";
    ctx.fillStyle="#E8A830";ctx.fillText(part1,startX,footY);
    ctx.fillStyle="rgba(240,240,240,0.75)";ctx.fillText(part2,startX+p1W,footY);

    // Bottom gold rule
    const bl=ctx.createLinearGradient(0,0,RW,0);
    bl.addColorStop(0,"rgba(232,168,48,0)");bl.addColorStop(0.15,"rgba(232,168,48,0.5)");bl.addColorStop(0.85,"rgba(232,168,48,0.5)");bl.addColorStop(1,"rgba(232,168,48,0)");
    ctx.strokeStyle=bl;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,RH-3);ctx.lineTo(RW,RH-3);ctx.stroke();
  };

  // Redraw whenever showPhoto toggles
  useEffect(()=>{
    if(!canvasRef.current)return;
    // Wait for Barlow Condensed to be ready
    document.fonts.load("900 64px 'Barlow Condensed'").then(()=>{
      if(hasPhoto&&showPhoto){
        const img=new Image();
        img.onload=()=>drawCard(img);
        img.onerror=()=>drawCard(null);
        img.src=profile.photo;
      } else {
        drawCard(null);
      }
    });
  },[showPhoto]);

  const shareToPhotos=async()=>{
    setSharing(true);
    const canvas=canvasRef.current;
    try{
      const blob=await new Promise(resolve=>canvas.toBlob(resolve,"image/png"));
      const file=new File([blob],"my-suppstack.png",{type:"image/png"});
      if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:"My Supplement Stack"});}
      else if(navigator.share){await navigator.share({title:"My Supplement Stack",url:window.location.href});}
      else{const a=document.createElement("a");a.download="my-suppstack.png";a.href=canvas.toDataURL("image/png");a.click();}
    }catch(e){if(e.name!=="AbortError"){const a=document.createElement("a");a.download="my-suppstack.png";a.href=canvas.toDataURL("image/png");a.click();}}
    setSharing(false);
  };

  const canNativeShare=typeof navigator.share!=="undefined";
  const [fullscreen,setFullscreen]=useState(false);
  return(
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      {/* Fullscreen preview overlay */}
      {fullscreen&&(
        <div onClick={()=>setFullscreen(false)} style={{position:"fixed",inset:0,zIndex:9999,background:"rgba(0,0,0,0.97)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px"}}>
          <div style={{position:"absolute",top:20,right:20,color:"#E8A830",fontFamily:"'Space Mono',monospace",fontSize:11,letterSpacing:"0.5px",opacity:0.7}}>TAP TO CLOSE</div>
          <canvas ref={null} style={{display:"none"}}/>
          <img src={canvasRef.current?.toDataURL("image/png")} style={{maxWidth:"100%",maxHeight:"90vh",borderRadius:12,objectFit:"contain",boxShadow:"0 0 60px rgba(232,168,48,0.15)"}} alt="Stack Card"/>
        </div>
      )}
      <div className="modal-box" style={{maxWidth:420}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <h2 style={{fontSize:20,fontWeight:700,color:"#F0F0F0",margin:0}}>Stack Card</h2>
          <button onClick={onClose} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:20,fontWeight:700,color:"#E8A830",lineHeight:1}}>✕</button>
        </div>
        <p style={{color:"#7A7D85",fontSize:11,fontFamily:"'Space Mono',monospace",marginBottom:14,lineHeight:1.6}}>iPhone share format · save or send anywhere</p>
        {/* Photo toggle — only show if profile has a photo */}
        {hasPhoto&&(
          <button onClick={()=>setShowPhoto(v=>!v)}
            style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"9px 12px",marginBottom:14,background:showPhoto?"rgba(232,168,48,0.07)":"transparent",border:`1px solid ${showPhoto?"rgba(232,168,48,0.35)":"#2A2B2E"}`,borderRadius:9,cursor:"pointer",transition:"all 0.15s"}}>
            <div style={{width:16,height:16,borderRadius:"50%",border:`2px solid ${showPhoto?"#E8A830":"#4A4B4F"}`,background:showPhoto?"#E8A830":"transparent",transition:"all 0.15s",flexShrink:0}}/>
            <span style={{fontFamily:"'Space Mono',monospace",fontSize:10,letterSpacing:"0.5px",color:showPhoto?"#E8A830":"#7A7D85"}}>INCLUDE PROFILE PHOTO</span>
          </button>
        )}
        <div onClick={()=>setFullscreen(true)} style={{borderRadius:12,overflow:"hidden",marginBottom:6,border:"1px solid rgba(232,168,48,0.25)",maxHeight:340,display:"flex",alignItems:"center",justifyContent:"center",background:"#060A0D",cursor:"zoom-in",position:"relative"}}>
          <canvas ref={canvasRef} style={{width:"100%",height:"auto",display:"block",maxHeight:340,objectFit:"contain"}}/>
          <div style={{position:"absolute",bottom:8,right:8,background:"rgba(0,0,0,0.6)",border:"1px solid rgba(232,168,48,0.3)",borderRadius:6,padding:"3px 8px",pointerEvents:"none"}}>
            <span style={{color:"#E8A830",fontFamily:"'Space Mono',monospace",fontSize:8,letterSpacing:"0.5px"}}>TAP TO PREVIEW</span>
          </div>
        </div>
        <p style={{color:"#4A4B4F",fontFamily:"'Space Mono',monospace",fontSize:9,letterSpacing:"0.5px",marginBottom:12,textAlign:"center"}}>TAP IMAGE FOR FULL PREVIEW</p>
        <div className="flex gap-10">
          <button className="btn-cancel flex-1" onClick={onClose}>Close</button>
          <button className="btn-primary" style={{flex:2,opacity:sharing?0.6:1}} onClick={shareToPhotos} disabled={sharing}>{sharing?"SHARING...":canNativeShare?"SAVE / SHARE":"DOWNLOAD"}</button>
        </div>
      </div>
    </div>
  );
}


// ── BatchLogModal ─────────────────────────────────────────────────────────────
function BatchLogModal({supplements,logs,todayFeel,onClose,onSaveAll}){
  const tISO=todayISO();
  const unlogged=supplements.filter(s=>!logs.some(l=>l.suppId===s.id&&(l.date===tISO||toISODate(l.ts)===tISO))).sort((a,b)=>a.name.localeCompare(b.name));
  const alreadyLogged=supplements.filter(s=>logs.some(l=>l.suppId===s.id&&(l.date===tISO||toISODate(l.ts)===tISO)));
  // status: "taken" | "later" | "skip"
  const [rows,setRows]=useState(()=>unlogged.map(s=>({suppId:s.id,name:s.name,unit:s.unit,servingSize:s.servingSize,status:"taken",amount:s.servingSize,notes:""})));
  const isFirstLog=!todayFeel;
  const [feel,setFeel]=useState(todayFeel||{energy:null,recovery:null,mood:null,sleep:null});
  const [feelChanged,setFeelChanged]=useState(false);
  const updateRow=(suppId,field,value)=>setRows(prev=>prev.map(r=>r.suppId===suppId?{...r,[field]:value}:r));

  // Cycle through: taken → later → skip → taken
  const cycleStatus=(suppId)=>{
    setRows(prev=>prev.map(r=>{
      if(r.suppId!==suppId)return r;
      const next=r.status==="taken"?"later":r.status==="later"?"skip":"taken";
      return{...r,status:next};
    }));
  };

  // Only rows actually being saved (taken or skip) — "later" rows are excluded
  const activeRows=rows.filter(r=>r.status!=="later");
  const takenRows=rows.filter(r=>r.status==="taken");
  const allLater=rows.every(r=>r.status==="later");

  const handleSaveAll=()=>{
    // Pass only taken+skip rows to the save handler
    onSaveAll(activeRows.map(r=>({...r,taken:r.status==="taken"})),feel);
  };

  // Status pill styling
  const statusStyle=(status)=>{
    if(status==="taken")return{border:"1px solid #5BAD72",background:"rgba(91,173,114,0.12)",color:"#5BAD72"};
    if(status==="later")return{border:"1px solid #4A4B4F",background:"transparent",color:"#4A4B4F"};
    return{border:"1px solid #C0392B",background:"rgba(192,57,43,0.08)",color:"#C0392B"};
  };
  const statusLabel=(status)=>status==="taken"?"TAKEN":status==="later"?"LATER":"SKIP";
  const rowBorderLeft=(status)=>status==="taken"?"#E8A830":status==="later"?"#2A2B2E":"#3A3B3E";

  return(
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-box" style={{padding:"18px 20px",maxHeight:"88vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <h2 style={{fontSize:19,fontWeight:700,color:"#F0F0F0",margin:0}}>Log Today</h2>
            <p style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:10,margin:"3px 0 0"}}>{new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})}</p>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:20,fontWeight:700,color:"#E8A830",lineHeight:1}}>✕</button>
        </div>

        {alreadyLogged.length>0&&(
          <div style={{marginBottom:12}}>
            <span style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:9,letterSpacing:"1.5px",display:"block",marginBottom:6}}>ALREADY LOGGED TODAY</span>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {alreadyLogged.map(s=>(<div key={s.id} style={{background:"rgba(91,173,114,0.1)",border:"1px solid rgba(91,173,114,0.25)",borderRadius:20,padding:"4px 10px"}}><span style={{color:"#5BAD72",fontFamily:"'Space Mono',monospace",fontSize:10}}>✓ {s.name}</span></div>))}
            </div>
          </div>
        )}

        {unlogged.length===0?(
          <div style={{textAlign:"center",padding:"30px 0"}}>
            <p style={{color:"#5BAD72",fontFamily:"'Space Mono',monospace",fontSize:13,fontWeight:700,marginBottom:6}}>ALL LOGGED ✓</p>
            <p style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:11}}>You've logged everything for today.</p>
            <button onClick={onClose} className="btn-primary" style={{marginTop:16,padding:"10px 24px"}}>DONE</button>
          </div>
        ):(
          <>
            {/* Legend */}
            <div style={{display:"flex",gap:8,marginBottom:10,padding:"8px 10px",background:"#111213",borderRadius:9,border:"1px solid #2A2B2E"}}>
              <span style={{color:"#4A4B4F",fontFamily:"'Space Mono',monospace",fontSize:8,letterSpacing:"0.5px",marginRight:4,alignSelf:"center"}}>TAP STATUS TO CYCLE:</span>
              {[{s:"taken",label:"TAKEN"},{s:"later",label:"LATER"},{s:"skip",label:"SKIP"}].map(({s,label})=>(
                <span key={s} style={{...statusStyle(s),borderRadius:5,padding:"2px 7px",fontFamily:"'Space Mono',monospace",fontSize:8,fontWeight:700,letterSpacing:"0.3px"}}>{label}</span>
              ))}
            </div>

            <div style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:9,letterSpacing:"1.5px"}}>TO LOG</span>
                {rows.some(r=>r.status==="later")&&(
                  <span style={{color:"#4A4B4F",fontFamily:"'Space Mono',monospace",fontSize:9}}>
                    {rows.filter(r=>r.status==="later").length} saved for later
                  </span>
                )}
              </div>
              <div style={{maxHeight:210,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
                {rows.map((row)=>(
                  <div key={row.suppId} style={{
                    background:row.status==="taken"?"#1C1D1F":"#111213",
                    border:row.status==="taken"?"1px solid #2A2B2E":"1px solid #1C1D1F",
                    borderLeft:`3px solid ${rowBorderLeft(row.status)}`,
                    borderRadius:8,padding:"7px 10px",marginBottom:5,
                    transition:"all 0.15s",
                    opacity:row.status==="later"?0.45:1
                  }}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{
                        color:row.status==="taken"?"#F0F0F0":"#4A4B4F",
                        fontWeight:700,fontSize:12,flex:1,minWidth:0,
                        whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
                        textDecoration:row.status==="later"?"line-through":"none"
                      }}>{row.name}</span>

                      {row.status==="taken"&&<>
                        <button onClick={()=>updateRow(row.suppId,"amount",Math.max(0,row.amount-row.servingSize))} style={{width:22,height:22,borderRadius:5,border:"1px solid #2A2B2E",background:"#111213",color:"#F0F0F0",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,lineHeight:1}}>−</button>
                        <span style={{color:"#E8A830",fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:11,minWidth:36,textAlign:"center",flexShrink:0}}>{row.amount} {row.unit==="count"?"count":row.unit}</span>
                        <button onClick={()=>updateRow(row.suppId,"amount",row.amount+row.servingSize)} style={{width:22,height:22,borderRadius:5,border:"1px solid #2A2B2E",background:"#111213",color:"#F0F0F0",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,lineHeight:1}}>+</button>
                      </>}

                      {/* 3-state cycle button */}
                      <button onClick={()=>cycleStatus(row.suppId)} style={{
                        padding:"3px 8px",borderRadius:5,
                        fontFamily:"'Space Mono',monospace",fontSize:9,fontWeight:700,
                        cursor:"pointer",flexShrink:0,transition:"all 0.12s",
                        ...statusStyle(row.status)
                      }}>{statusLabel(row.status)}</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Feel scores — only show if something is being logged now */}
            {takenRows.length>0&&(
              <div style={{marginBottom:14}}>
                <span style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:9,letterSpacing:"1.5px",display:"block",marginBottom:8}}>HOW ARE YOU FEELING?</span>
                {isFirstLog?(
                  <div style={{background:"#111213",border:"1px solid #2A2B2E",borderRadius:10,padding:"12px"}}>
                    {[{key:"energy",label:"ENERGY"},{key:"recovery",label:"RECOVERY"},{key:"mood",label:"MOOD"},{key:"sleep",label:"SLEEP"}].map(metric=>(
                      <div key={metric.key} style={{marginBottom:8}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:10}}>{metric.label}</span><span style={{color:"#E8A830",fontFamily:"'Space Mono',monospace",fontSize:10,fontWeight:700}}>{feel[metric.key]||"—"}</span></div>
                        <div style={{display:"flex",gap:5}}>{[1,2,3,4,5].map(n=>(<button key={n} onClick={()=>setFeel(f=>({...f,[metric.key]:n}))} style={{flex:1,padding:"6px 0",borderRadius:6,cursor:"pointer",fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:700,border:feel[metric.key]===n?"1px solid #E8A830":"1px solid #2A2B2E",background:feel[metric.key]===n?"rgba(232,168,48,0.12)":"transparent",color:feel[metric.key]===n?"#E8A830":"#7A7D85",transition:"all 0.1s"}}>{n}</button>))}</div>
                      </div>
                    ))}
                  </div>
                ):(
                  <div style={{background:"#111213",border:"1px solid #2A2B2E",borderRadius:10,padding:"10px 12px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:feelChanged?12:8}}>
                      <span style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:10,letterSpacing:"1px"}}>TODAY'S FEEL</span>
                      <div style={{display:"flex",gap:12}}>
                        {[{k:"energy",l:"ENERGY"},{k:"recovery",l:"RECOVERY"},{k:"mood",l:"MOOD"},{k:"sleep",l:"SLEEP"}].map(m=>(<div key={m.k} style={{textAlign:"center"}}><div style={{color:"#E8A830",fontFamily:"'Space Mono',monospace",fontSize:13,fontWeight:700,lineHeight:1}}>{feel[m.k]||"—"}</div><div style={{color:"#4A4B4F",fontFamily:"'Space Mono',monospace",fontSize:8,marginTop:1}}>{m.l}</div></div>))}
                      </div>
                    </div>
                    {!feelChanged&&(<div style={{display:"flex",gap:6}}><button onClick={()=>setFeelChanged(false)} style={{flex:1,padding:"6px 0",borderRadius:7,fontFamily:"'Space Mono',monospace",fontSize:10,fontWeight:700,border:"1px solid #5BAD72",background:"rgba(91,173,114,0.1)",color:"#5BAD72",cursor:"pointer"}}>SAME</button><button onClick={()=>setFeelChanged(true)} style={{flex:1,padding:"6px 0",borderRadius:7,fontFamily:"'Space Mono',monospace",fontSize:10,fontWeight:700,border:"1px solid #2A2B2E",background:"transparent",color:"#7A7D85",cursor:"pointer"}}>DIFFERENT</button></div>)}
                    {feelChanged&&(<div>{[{key:"energy",label:"ENERGY"},{key:"recovery",label:"RECOVERY"},{key:"mood",label:"MOOD"},{key:"sleep",label:"SLEEP"}].map(metric=>(<div key={metric.key} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:10}}>{metric.label}</span><span style={{color:"#E8A830",fontFamily:"'Space Mono',monospace",fontSize:10,fontWeight:700}}>{feel[metric.key]||"—"}</span></div><div style={{display:"flex",gap:5}}>{[1,2,3,4,5].map(n=>(<button key={n} onClick={()=>setFeel(f=>({...f,[metric.key]:n}))} style={{flex:1,padding:"6px 0",borderRadius:6,cursor:"pointer",fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:700,border:feel[metric.key]===n?"1px solid #E8A830":"1px solid #2A2B2E",background:feel[metric.key]===n?"rgba(232,168,48,0.12)":"transparent",color:feel[metric.key]===n?"#E8A830":"#7A7D85",transition:"all 0.1s"}}>{n}</button>))}</div></div>))}<button onClick={()=>{setFeel(todayFeel);setFeelChanged(false);}} style={{background:"transparent",border:"none",color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:10,cursor:"pointer",padding:"4px 0"}}>← back to same</button></div>)}
                  </div>
                )}
              </div>
            )}

            <div style={{display:"flex",gap:8}}>
              <button onClick={onClose} className="btn-cancel" style={{flex:1,padding:"11px 0"}}>Cancel</button>
              <button
                onClick={handleSaveAll}
                disabled={allLater}
                className="btn-primary"
                style={{flex:2,padding:"11px 0",opacity:allLater?0.4:1,cursor:allLater?"not-allowed":"pointer"}}
              >
                {allLater
                  ?"SET AT LEAST ONE"
                  :takenRows.length>0
                    ?`LOG ${takenRows.length} · SKIP ${activeRows.length-takenRows.length}`
                    :`SKIP ${activeRows.length}`
                }
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── ProfileModal ──────────────────────────────────────────────────────────────
function ProfileModal({profile,onClose,onUpdate,isPro,supplements,logs}){
  const [editing,setEditing]=useState(false);
  const [form,setForm]=useState({...profile});
  const [photoPreview,setPhotoPreview]=useState(profile?.photo||null);
  const [cropSrc,setCropSrc]=useState(null);
  const [viewingPhoto,setViewingPhoto]=useState(false);
  const [importMsg,setImportMsg]=useState(null);
  const photoInputRef=useRef(null);
  const importRef=useRef(null);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const currency=CURRENCIES[profile?.country||"Other"]||"£";
  const handlePhotoChange=(e)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>setCropSrc(ev.target.result);
    reader.readAsDataURL(file);
  };
  const handleSave=()=>{onUpdate({...form,photo:photoPreview});setEditing(false);};
  const handleExport=()=>{
    const data={version:1,exportedAt:new Date().toISOString(),profile,supplements,logs};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download=`suppstackd-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();URL.revokeObjectURL(a.href);
  };
  const handleImport=(e)=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.supplements||!data.logs){setImportMsg("⚠ Invalid backup file.");return;}
        save("suppstackd_v1_supplements",data.supplements);
        save("suppstackd_v1_logs",data.logs);
        if(data.profile)save("suppstackd_v1_profile",data.profile);
        setImportMsg("✓ Restored — reload the app to apply.");
      }catch{setImportMsg("⚠ Could not read file.");}
    };
    reader.readAsText(file);e.target.value="";
  };
  return(
    <div style={{position:"fixed",inset:0,zIndex:100,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      {/* Fullscreen photo overlay */}
      {viewingPhoto&&(photoPreview||profile?.photo)&&(
        <div onClick={()=>setViewingPhoto(false)} style={{position:"fixed",inset:0,zIndex:9999,background:"rgba(0,0,0,0.95)",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <img src={photoPreview||profile.photo} style={{width:"85vw",height:"85vw",maxWidth:340,maxHeight:340,borderRadius:"50%",objectFit:"cover",border:"3px solid #E8A830",boxShadow:"0 0 40px rgba(232,168,48,0.3)"}} alt="Profile"/>
          <div style={{position:"absolute",top:20,right:20,color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:10,letterSpacing:"0.5px"}}>TAP TO CLOSE</div>
        </div>
      )}
      {/* Crop editor overlay */}
      {cropSrc&&(
        <div style={{position:"fixed",inset:0,zIndex:9998,background:"rgba(10,10,10,0.97)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{width:"100%",maxWidth:340}}>
            <h3 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900,color:"#F0F0F0",textAlign:"center",marginBottom:16}}>CROP PHOTO</h3>
            <PhotoCropEditor src={cropSrc} onConfirm={(cropped)=>{setPhotoPreview(cropped);set("photo",cropped);setCropSrc(null);}} onCancel={()=>setCropSrc(null)}/>
          </div>
        </div>
      )}
      {/* Full-screen sheet */}
      <div style={{
        width:"100%", maxWidth:480,
        height:"100dvh",
        background:"#111213",
        display:"flex", flexDirection:"column",
        padding:"env(safe-area-inset-top,44px) 0 env(safe-area-inset-bottom,0px)",
        overflow:"hidden",
      }}>
        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0 clamp(16px,5vw,24px)",marginBottom:"clamp(12px,2.5vh,20px)",flexShrink:0}}>
          <h2 style={{fontSize:"clamp(18px,4.5vw,22px)",fontWeight:700,color:"#F0F0F0",margin:0}}>{editing?"Edit Profile":"Profile"}</h2>
          <button onClick={onClose} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:22,fontWeight:700,color:"#E8A830",lineHeight:1,padding:"4px 6px"}}>✕</button>
        </div>

        {/* Avatar */}
        <div style={{display:"flex",justifyContent:"center",marginBottom:"clamp(10px,2vh,18px)",flexShrink:0}}>
          <div style={{position:"relative"}}>
            <div onClick={()=>{if(!editing&&(photoPreview||profile?.photo))setViewingPhoto(true);}}
              style={{width:"clamp(68px,16vw,96px)",height:"clamp(68px,16vw,96px)",borderRadius:"50%",background:"#1C1D1F",border:"2px solid #E8A830",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",cursor:(!editing&&(photoPreview||profile?.photo))?"zoom-in":"default"}}>
              {(photoPreview||profile?.photo)
                ?<img src={photoPreview||profile.photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="Profile"/>
                :<span style={{fontSize:"clamp(24px,6vw,36px)",color:"#7A7D85"}}>{profile?.name?profile.name[0].toUpperCase():"?"}</span>
              }
            </div>
            {editing&&(

// ── DailyCostModal ────────────────────────────────────────────────────────────
function DailyCostModal({supplements,profile,onClose}){
  const currency=CURRENCIES[profile?.country||"GB"]||"£";

  const items=supplements.map(s=>{
    if(!s.price||!s.totalAmount||!s.servingSize||!s.servingsPerDay)return null;
    const servingsInContainer=s.totalAmount/s.servingSize;
    const costPerServing=s.price/servingsInContainer;
    const dailyCost=costPerServing*s.servingsPerDay;
    const daysSupply=Math.floor(servingsInContainer/s.servingsPerDay);
    const monthlyCost=dailyCost*30;
    return{id:s.id,name:s.name,brand:s.brand,type:s.type,dailyCost,monthlyCost,costPerServing,daysSupply,price:s.price,servingsPerDay:s.servingsPerDay,servingSize:s.servingSize,unit:s.unit,totalAmount:s.totalAmount};
  }).filter(Boolean).sort((a,b)=>b.dailyCost-a.dailyCost);

  const totalDaily=items.reduce((a,i)=>a+i.dailyCost,0);
  const totalMonthly=items.reduce((a,i)=>a+i.monthlyCost,0);
  const totalAnnual=totalMonthly*12;
  const maxCost=items.length?items[0].dailyCost:1;

  const noPrice=supplements.filter(s=>!s.price||!s.totalAmount);

  return(
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-box" style={{padding:"18px 20px",maxHeight:"88vh",overflowY:"auto"}}>
        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <div>
            <p style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:9,letterSpacing:"1.5px",margin:"0 0 3px"}}>COST BREAKDOWN</p>
            <h2 style={{fontSize:20,fontWeight:700,color:"#F0F0F0",margin:0,lineHeight:1.2}}>Daily Stack Cost</h2>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:20,fontWeight:700,color:"#E8A830",lineHeight:1,padding:"2px 4px"}}>✕</button>
        </div>

        {/* Summary totals */}
        {items.length>0&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:16}}>
            {[
              {label:"PER DAY",value:`${currency}${totalDaily.toFixed(2)}`},
              {label:"PER MONTH",value:`${currency}${totalMonthly.toFixed(2)}`},
              {label:"PER YEAR",value:`${currency}${totalAnnual.toFixed(0)}`},
            ].map(s=>(
              <div key={s.label} style={{background:"#111213",border:"1px solid rgba(232,168,48,0.2)",borderRadius:9,padding:"10px 8px",textAlign:"center"}}>
                <div style={{fontSize:s.label==="PER YEAR"?13:15,fontWeight:800,color:"#E8A830",fontFamily:"'Space Mono',monospace",lineHeight:1.2}}>{s.value}</div>
                <div style={{fontSize:8,color:"#7A7D85",fontFamily:"'Space Mono',monospace",marginTop:3,letterSpacing:"0.5px"}}>{s.label}</div>
              </div>
            ))}
          </div>
        )}

        {/* Per-supplement breakdown */}
        {items.length>0&&(
          <div style={{marginBottom:14}}>
            <span style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:9,letterSpacing:"1.5px",display:"block",marginBottom:10}}>PER SUPPLEMENT</span>
            {items.map((item,i)=>{
              const barPct=Math.max(4,(item.dailyCost/maxCost)*100);
              const pctOfTotal=totalDaily>0?((item.dailyCost/totalDaily)*100).toFixed(0):0;
              return(
                <div key={item.id} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:4}}>
                    <div style={{flex:1,minWidth:0,paddingRight:10}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:1}}>
                        <span style={{color:"#F0F0F0",fontWeight:700,fontSize:13,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.name}</span>
                        <span style={{color:"#4A4B4F",fontFamily:"'Space Mono',monospace",fontSize:9,flexShrink:0}}>{pctOfTotal}%</span>
                      </div>
                      {item.brand&&<span style={{color:"#4A4B4F",fontFamily:"'Space Mono',monospace",fontSize:9}}>{item.brand}</span>}
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{color:"#E8A830",fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:13,lineHeight:1}}>{currency}{item.dailyCost.toFixed(2)}<span style={{color:"#4A4B4F",fontSize:9}}>/day</span></div>
                      <div style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:9,marginTop:1}}>{currency}{item.monthlyCost.toFixed(2)}/mo · {item.daysSupply}d supply</div>
                    </div>
                  </div>
                  {/* Bar */}
                  <div style={{height:3,background:"#2A2B2E",borderRadius:2}}>
                    <div style={{height:"100%",width:`${barPct}%`,borderRadius:2,background:`linear-gradient(90deg,#E8A830,#C88820)`,transition:"width 0.5s ease"}}/>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Supplements missing price */}
        {noPrice.length>0&&(
          <div style={{background:"rgba(232,168,48,0.05)",border:"1px solid rgba(232,168,48,0.15)",borderRadius:9,padding:"10px 14px",marginBottom:14}}>
            <p style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:10,margin:"0 0 6px",letterSpacing:"0.5px"}}>NOT INCLUDED — NO PRICE SET</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {noPrice.map(s=>(

            <p style={{color:"#4A4B4F",fontFamily:"'Space Mono',monospace",fontSize:9,margin:"8px 0 0",lineHeight:1.6}}>Edit these supplements and add a price to include them in cost tracking.</p>
          </div>
        )}

        {items.length===0&&noPrice.length===0&&(
          <p style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:12,textAlign:"center",padding:"30px 0"}}>No supplements tracked yet.</p>
        )}

        {items.length===0&&noPrice.length>0&&(
          <div style={{textAlign:"center",padding:"10px 0 16px"}}>
            <p style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:12,lineHeight:1.7}}>Add prices to your supplements<br/>to see your daily cost breakdown.</p>
          </div>
        )}

        <button onClick={onClose} style={{width:"100%",padding:"10px",background:"transparent",border:"1px solid #2A2B2E",borderRadius:9,color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:12,cursor:"pointer"}}>CLOSE</button>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const [supplements,setSupplements]=useState(()=>load(STORAGE_KEY,[]).map(s=>({...s,type:normalizeType(s.type)})));
  const [logs,setLogs]=useState(()=>load(LOG_KEY,[]));
  const [profile,setProfile]=useState(()=>load(PROFILE_KEY,null));
  const [tab,setTab]=useState("stack");
  const [slideDir,setSlideDir]=useState(null); // "left" | "right" | null
  const [tabDragX,setTabDragX]=useState(0);    // live drag offset for indicator (-1 to 1)
  const swipeTouchRef=useRef(null);            // {startX, startY, locked, axis}
  const shellScrollRef=useRef(null);           // for resetting scroll on tab switch
  const [showAdd,setShowAdd]=useState(false);
  const [showCostBreakdown,setShowCostBreakdown]=useState(false);
  const [showShare,setShowShare]=useState(false);
  const [showBatchLog,setShowBatchLog]=useState(false);
  const [showProfile,setShowProfile]=useState(false);
  const [showInsights,setShowInsights]=useState(false);
  const [editSupp,setEditSupp]=useState(null);
  const [logSupp,setLogSupp]=useState(null);
  const [showNotif,setShowNotif]=useState(false);
  const [showFeedback,setShowFeedback]=useState(false);
  const [isAutoFeedback,setIsAutoFeedback]=useState(false);
  const [showInbox,setShowInbox]=useState(false);
  const [filter,setFilter]=useState("all");
  const [sortBy,setSortBy]=useState("runout");
  const [selectedDate,setSelectedDate]=useState(null);
  const [lockedDate,setLockedDate]=useState(null);
  const [viewSupp,setViewSupp]=useState(null);
  const [calendarView,setCalendarView]=useState("strip");
  const [calendarMonth,setCalendarMonth]=useState(new Date().getMonth());
  const [calendarYear,setCalendarYear]=useState(new Date().getFullYear());
  const scrollTodayRef=useRef(null);

  useEffect(()=>save(STORAGE_KEY,supplements),[supplements]);
  useEffect(()=>save(LOG_KEY,logs),[logs]);

  useEffect(()=>{
    Promise.all([loadAsync(STORAGE_KEY,[]),loadAsync(LOG_KEY,[]),loadAsync(PROFILE_KEY,null)]).then(([supps,lg,prof])=>{
      if(supps&&supps.length>0)setSupplements(supps);
      if(lg&&lg.length>0)setLogs(lg);
      if(prof)setProfile(prof);
    }).catch(()=>{});
  },[]);

  const openManualFeedback=()=>{setIsAutoFeedback(false);setShowFeedback(true);};
  useEffect(()=>{window._openFeedback=openManualFeedback;},[]);

  useEffect(()=>{
    let notifTimer=null;
    if(typeof Notification!=="undefined"&&Notification.permission==="granted"&&supplements.length>0){
      const now=new Date();
      const midday=new Date(now.getFullYear(),now.getMonth(),now.getDate(),12,0,0);
      const msUntilMidday=midday-now;
      if(msUntilMidday>0){
        notifTimer=setTimeout(()=>{
          const unlogged=supplements.filter(s=>s.lastLogged!==today());
          if(unlogged.length>0)
            fireNotif("Suppstackd — Log your supplements",`${unlogged.length} supplement${unlogged.length>1?"s":""} not logged today.`);
        },msUntilMidday);
      }
      // Push data to SW for background notifications (fires even when app is closed)
      if(window._scheduleSWNotifs){
        // Small delay to ensure SW is ready
        setTimeout(()=>window._scheduleSWNotifs(supplements,todayISO()),1500);
      }
      // Low stock alerts — in-app fallback (fires when app is open)
      const critical=supplements.filter(s=>{const d=daysFromNow(calcRunOut(s));return d>=0&&d<=7;});
      if(critical.length>0){
        const names=critical.map(s=>s.name).join(", ");
        const msg=critical.length===1
          ?`${critical[0].name} — approx ${Math.max(0,daysFromNow(calcRunOut(critical[0])))}d supply left. Time to reorder.`
          :`${critical.length} supps running low: ${names}. Check your stack.`;
        fireNotif("Suppstackd — Low stock",msg,800);
      }
    }
    if(checkAndTrackActiveDay())setTimeout(()=>{setIsAutoFeedback(true);setShowFeedback(true);},2000);
    return()=>{if(notifTimer)clearTimeout(notifTimer);};
  },[]);

  if(!profile)return<ProfileOnboarding onComplete={p=>{setProfile(p);save(PROFILE_KEY,{...p,createdAt:new Date().toISOString()});}}/>;

  const addOrUpdate=s=>{
    const ns={...s,type:normalizeType(s.type)};
    setSupplements(prev=>{
      const ex=prev.find(p=>p.id===ns.id);
      if(ex)return prev.map(p=>p.id===ns.id?ns:p);
      // Always store createdAt as a plain YYYY-MM-DD string for reliable comparisons
      return[...prev,{...ns,createdAt:ns.createdAt||todayISO()}];
    });
    setShowAdd(false);setEditSupp(null);
  };
  const deleteSupp=id=>{
    if(confirm("Remove this supplement? Your log history will be preserved."))
      setSupplements(prev=>prev.map(s=>s.id===id?{...s,removed:true,removedAt:todayISO()}:s));
  };
  const saveLog=({taken,amount,notes,feel})=>{
    const t=today();const tISO=todayISO();
    setSupplements(prev=>prev.map(s=>s.id!==logSupp.id?s:{...s,consumed:s.consumed+(taken?amount:0),lastLogged:t}));
    setLogs(prev=>[...prev,{suppId:logSupp.id,date:tISO,taken,amount,notes,feel,ts:Date.now()}]);

      {showProfile&&<ProfileModal profile={profile} onClose={()=>setShowProfile(false)} onUpdate={updateProfile} isPro={isPro} supplements={supplements} logs={logs}/>}
      {showInsights&&<InsightsModal onClose={()=>setShowInsights(false)} logs={logs} supplements={supplements} isPro={isPro}/>}
      {viewSupp&&(()=>{const _vdep=(viewSupp.totalAmount-(viewSupp.consumed||0))<=0||viewSupp.discontinued===true;return(<SupplementDetailSheet supp={viewSupp} logs={logs} profile={profile} readOnly={_vdep} onClose={()=>setViewSupp(null)} onEdit={_vdep?null:()=>{setEditSupp(viewSupp);setViewSupp(null);}} onReAdd={_vdep?()=>{const fresh={...viewSupp,consumed:0,discontinued:false,discontinuedAt:null,createdAt:todayISO()};setViewSupp(null);setEditSupp(fresh);}:null}/>);})()}
      {selectedDate&&<DateLogModal date={selectedDate} supplements={supplements} logs={logs} onClose={()=>setSelectedDate(null)} onSaveLog={saveBackdatedLog} onEditLog={editBackdatedLog} onDeleteLog={deleteLog}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
