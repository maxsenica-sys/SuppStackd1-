    .then(reg => {
      window._swReg = reg;
      console.log('[SW] Registered');
    })
    .catch(err => console.warn('[SW] Registration failed:', err));
}

// Called by the app to push supplement data into the SW
window._scheduleSWNotifs = function(supplements, todayStr) {
  if (!window._swReg || !window._swReg.active) return;
  const now = new Date();
  const midday = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 12, 0, 0);
  window._swReg.active.postMessage({
    type: 'SCHEDULE_NOTIFS',
    payload: {
      supplements,
      todayStr,
      scheduledTime: midday > now ? midday.getTime() : null
    }
  });
};

function lookupBenefits(name){
  if(!name)return null;
  const n=name.toLowerCase().trim();
  // Direct match
  if(SUPP_BENEFITS[n])return SUPP_BENEFITS[n];
  // Partial match — check if any key is contained in the name or vice versa
  const keys=Object.keys(SUPP_BENEFITS);
  for(const key of keys){
    if(n.includes(key)||key.includes(n))return SUPP_BENEFITS[key];
  }
  // Word overlap match — find key sharing the most significant words
  const stopWords=new Set(["the","and","with","for","of","a","an","in","is","to"]);
  const nameWords=n.split(/\s+/).filter(w=>w.length>2&&!stopWords.has(w));
  let bestMatch=null,bestScore=0;
  for(const key of keys){
    const keyWords=key.split(/\s+/).filter(w=>w.length>2&&!stopWords.has(w));
    const shared=nameWords.filter(w=>keyWords.some(kw=>kw.includes(w)||w.includes(kw))).length;
    if(shared>bestScore){bestScore=shared;bestMatch=key;}
  }
  return bestScore>0?SUPP_BENEFITS[bestMatch]:null;
}
function lookupTiming(name){
  if(!name)return null;
  const n=name.toLowerCase().trim();
  if(SUPP_TIMING[n])return SUPP_TIMING[n];
  const keys=Object.keys(SUPP_TIMING);
  for(const key of keys){if(key.length>=7&&(n.includes(key)||key.includes(n)))return SUPP_TIMING[key];}
  const stopWords=new Set(["the","and","with","for","of","a","an","in","is","to"]);
  const nameWords=n.split(/\s+/).filter(w=>w.length>2&&!stopWords.has(w));
  let bestMatch=null,bestScore=0;
  for(const key of keys){
    const keyWords=key.split(/\s+/).filter(w=>w.length>2&&!stopWords.has(w));
    const shared=nameWords.filter(w=>keyWords.some(kw=>kw.includes(w)||w.includes(kw))).length;
    if(shared>bestScore){bestScore=shared;bestMatch=key;}
  }
  return bestScore>0?SUPP_TIMING[bestMatch]:null;
}

function saveAsync(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch{}openDB().then(db=>{const tx=db.transaction(STORE_NAME,"readwrite");tx.objectStore(STORE_NAME).put({key,value:JSON.stringify(val)});}).catch(()=>{});}
function loadAsync(key,fb){return openDB().then(db=>{return new Promise((resolve)=>{const req=db.transaction(STORE_NAME,"readonly").objectStore(STORE_NAME).get(key);req.onsuccess=()=>{if(req.result){try{const parsed=JSON.parse(req.result.value);try{localStorage.setItem(key,req.result.value);}catch{}resolve(parsed||fb);}catch{resolve(fb);}}else{try{const ls=JSON.parse(localStorage.getItem(key));if(ls!==null&&ls!==undefined){saveAsync(key,ls);resolve(ls);}else{resolve(fb);}}catch{resolve(fb);}}};req.onerror=()=>{try{resolve(JSON.parse(localStorage.getItem(key))||fb);}catch{resolve(fb);}};});}).catch(()=>{try{return JSON.parse(localStorage.getItem(key))||fb;}catch{return fb;}});}

function today(){return new Date().toDateString();}

// ── localISO always uses local date, never UTC ────────────────────────────────
function localISO(date){
  const d=date||new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function todayISO(){return localISO(new Date());}

// ── Normalise any date value to a YYYY-MM-DD string safely ───────────────────
// Handles: "2025-03-01", "2025-03-01T12:00:00.000Z", timestamp numbers
function toISODate(val){
  if(!val)return null;
  if(typeof val==="number")return localISO(new Date(val));
  if(typeof val==="string"){
    // Already a plain date string
    if(/^\d{4}-\d{2}-\d{2}$/.test(val))return val;
    // Full ISO timestamp — slice the date part using local parsing
    return localISO(new Date(val));
  }
  if(val instanceof Date)return localISO(val);
  return null;
}

function formatDate(d){return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function daysFromNow(d){const now=new Date();now.setHours(0,0,0,0);const t=new Date(d);t.setHours(0,0,0,0);return Math.round((t-now)/86400000);}
function calcRunOut(s){const rem=s.totalAmount-s.consumed;if(rem<=0)return new Date();const d=new Date();d.setDate(d.getDate()+Math.ceil(rem/(s.servingSize*s.servingsPerDay)));return d;}
function urgencyColor(days){if(days<=7)return"#C0392B";if(days<=21)return"#E8A830";return"#5BAD72";}
function urgencyLabel(days){if(days<=0)return"DEPLETED";if(days<=7)return"CRITICAL";if(days<=21)return"LOW";return"STOCKED";}

function checkAndTrackActiveDay(){const todayStr=today();const alreadyShown=load(FB_SHOWN_KEY,false);if(alreadyShown)return false;let activeDays=load(ACTIVE_KEY,[]);if(!activeDays.includes(todayStr)){activeDays=[...activeDays,todayStr].slice(-10);save(ACTIVE_KEY,activeDays);}if(activeDays.length<3)return false;const last3=activeDays.slice(-3);const d2=new Date(last3[2]),d1=new Date(last3[1]),d0=new Date(last3[0]);d2.setHours(0,0,0,0);d1.setHours(0,0,0,0);d0.setHours(0,0,0,0);return Math.round((d2-d1)/86400000)===1&&Math.round((d1-d0)/86400000)===1;}

// ── CalendarBar ───────────────────────────────────────────────────────────────
function CalendarBar({logs,supplements,onDateSelect,selectedDate,lockedDate,calendarView,setCalendarView,calendarMonth,setCalendarMonth,calendarYear,setCalendarYear,onScrollToToday,onJumpToToday}){
  const DAY_NAMES=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const MONTH_NAMES=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const SHORT_MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const now=new Date();
  now.setHours(0,0,0,0);
  const todayStr=localISO(now);
  const todayMonth=now.getMonth();
  const todayYear=now.getFullYear();

  const days=[];
  for(let i=-60;i<=90;i++){
    const d=new Date(now);
    d.setDate(now.getDate()+i);
    days.push(d);
  }

  const dateCounts={};
  logs.forEach(l=>{
    try{
      const iso=toISODate(l.date)||toISODate(l.ts);
      if(!iso)return;
      if(!dateCounts[iso])dateCounts[iso]=new Set();
      dateCounts[iso].add(l.suppId);
    }catch{}
  });

  const getDateState=(iso,isPast)=>{
    if(!isPast)return"none";
    const activeSupps=supplements.filter(s=>{
      const created=toISODate(s.createdAt);
      if(!created||created>iso)return false;
      if(s.removed)return false;
      if(s.discontinued)return false;
      if((s.totalAmount-(s.consumed||0))<=0)return false;
      return true;
    });
    const activeCount=activeSupps.length;
    if(activeCount===0)return"none";
    const activeIds=new Set(activeSupps.map(s=>s.id));
    const dayLogs=logs.filter(l=>{try{return(toISODate(l.date)||toISODate(l.ts))===iso;}catch{return false;}});
    const takenIds=new Set(dayLogs.filter(l=>l.taken&&activeIds.has(l.suppId)).map(l=>l.suppId));
    const anyLoggedIds=new Set(dayLogs.filter(l=>activeIds.has(l.suppId)).map(l=>l.suppId));
    if(takenIds.size>=activeCount)return"full";
    if(anyLoggedIds.size>0)return"partial";
    return"none";
  };

  const futureRunOuts={};
  supplements.forEach(s=>{
    const ro=calcRunOut(s);
    const roISO=localISO(ro);
    const days=daysFromNow(ro);
    const color=urgencyColor(days);
    if(!futureRunOuts[roISO]){futureRunOuts[roISO]=color;}
    else{const priority=(c)=>c==="#C0392B"?2:c==="#E8A830"?1:0;if(priority(color)>priority(futureRunOuts[roISO]))futureRunOuts[roISO]=color;}
  });

  const todayRef=useRef(null);
  const stripRef=useRef(null);
  const [todayOffscreen,setTodayOffscreen]=useState(false);

  const snapToToday=()=>{
    if(todayRef.current){
      todayRef.current.scrollIntoView({inline:"center",behavior:"smooth"});
      const now=new Date();
      setCalendarMonth(now.getMonth());
      setCalendarYear(now.getFullYear());
    }
  };

  const scrollToToday=snapToToday;

  useEffect(()=>{
    if(todayRef.current)todayRef.current.scrollIntoView({inline:"center",behavior:"instant"});
  },[]);

  useEffect(()=>{if(onScrollToToday)onScrollToToday(scrollToToday);},[]);

  // Update header month/year to reflect centre-visible date as user scrolls
  const updateHeaderFromScroll=()=>{
    const strip=stripRef.current;
    if(!strip)return;
    const sr=strip.getBoundingClientRect();
    const midX=sr.left+sr.width/2;
    const pills=strip.querySelectorAll("[data-iso]");
    let closest=null,minDist=Infinity;
    pills.forEach(el=>{
      const r=el.getBoundingClientRect();
      const dist=Math.abs((r.left+r.width/2)-midX);
      if(dist<minDist){minDist=dist;closest=el;}
    });
    if(closest){
      const iso=closest.getAttribute("data-iso");
      if(iso){const d=new Date(iso+"T00:00:00");setCalendarMonth(d.getMonth());setCalendarYear(d.getFullYear());}
    }
  };

  // Scroll strip to a specific ISO date pill
  const snapToDate=(iso)=>{
    const strip=stripRef.current;
    if(!strip)return;
    const pill=strip.querySelector(`[data-iso="${iso}"]`);
    if(pill)pill.scrollIntoView({inline:"center",behavior:"smooth"});
    const d=new Date(iso+"T00:00:00");
    setCalendarMonth(d.getMonth());
    setCalendarYear(d.getFullYear());
  };

  // When lockedDate changes (new date selected), scroll the strip to it
  useEffect(()=>{
    if(lockedDate&&lockedDate!==todayStr){
      setTimeout(()=>snapToDate(lockedDate),150);
    }
  },[lockedDate]);

  // Track off-screen state + 2s idle snap — only snap when nothing is locked
  useEffect(()=>{
    const strip=stripRef.current;
    if(!strip)return;
    let snapTimer=null;
    const check=()=>{
      if(!todayRef.current)return;
      const sr=strip.getBoundingClientRect();
      const tr=todayRef.current.getBoundingClientRect();
      setTodayOffscreen(tr.right<sr.left+8||tr.left>sr.right-8);
    };
    const onScroll=()=>{
      check();
      updateHeaderFromScroll();
      // Only auto-snap back to today if no date is locked
      if(!lockedDate){
        if(snapTimer)clearTimeout(snapTimer);
        snapTimer=setTimeout(()=>{snapToToday();},4000);
      }
    };
    strip.addEventListener("scroll",onScroll,{passive:true});
    check();
    return()=>{strip.removeEventListener("scroll",onScroll);if(snapTimer)clearTimeout(snapTimer);};
  },[lockedDate]);

  // Build today pill style (same as the in-strip today pill)
  const todayDateState=getDateState(todayStr,false);

  // ── Month view ────────────────────────────────────────────────────────────
  if(calendarView==="month"){
    const getDaysInMonth=(y,m)=>new Date(y,m+1,0).getDate();
    const getFirstDayOfMonth=(y,m)=>new Date(y,m,1).getDay();
    const daysInMonth=getDaysInMonth(calendarYear,calendarMonth);
    const firstDay=getFirstDayOfMonth(calendarYear,calendarMonth);
    const cells=[];
    for(let i=0;i<firstDay;i++)cells.push(null);
    for(let d=1;d<=daysInMonth;d++)cells.push(d);
    while(cells.length%7!==0)cells.push(null);
    const prevMonth=()=>{if(calendarMonth===0){setCalendarMonth(11);setCalendarYear(y=>y-1);}else setCalendarMonth(m=>m-1);};
    const nextMonth=()=>{if(calendarMonth===11){setCalendarMonth(0);setCalendarYear(y=>y+1);}else setCalendarMonth(m=>m+1);};
    const getDotForDate=(iso)=>{
      const isFuture=iso>todayStr;const isPast=iso<todayStr;
      if(isFuture&&futureRunOuts[iso])return futureRunOuts[iso];
      if(isPast){const state=getDateState(iso,true);if(state==="full")return"#5BAD72";if(state==="partial")return"#E8A830";}
      return null;
    };
    return(
      <div style={{marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <button onClick={prevMonth} style={{background:"transparent",border:"1px solid #2A2B2E",borderRadius:8,color:"#7A7D85",width:32,height:32,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <button onClick={()=>setCalendarView("year")} style={{background:"transparent",border:"none",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:20,color:"#F0F0F0",letterSpacing:"0.5px"}}>
            {MONTH_NAMES[calendarMonth]} <span style={{color:"#E8A830"}}>{calendarYear}</span>
          </button>
          <button onClick={nextMonth} style={{background:"transparent",border:"1px solid #2A2B2E",borderRadius:8,color:"#7A7D85",width:32,height:32,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {DAY_NAMES.map(d=><div key={d} style={{textAlign:"center",fontFamily:"'Space Mono',monospace",fontSize:8,color:"#4A4B4F",padding:"2px 0"}}>{d.slice(0,1)}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
          {cells.map((day,i)=>{
            if(!day)return<div key={i}/>;
            const iso=`${calendarYear}-${String(calendarMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
            const isToday=iso===todayStr;const isSelected=selectedDate===iso;
            const dot=getDotForDate(iso);
            return(
              <div key={i} onClick={()=>{
                onDateSelect(iso);
                setCalendarView("strip");
                // Scroll strip to this date after switching back
                setTimeout(()=>{
                  const strip=document.querySelector(".cal-bar");
                  if(!strip)return;
                  const pill=strip.querySelector(`[data-iso="${iso}"]`);
                  if(pill)pill.scrollIntoView({inline:"center",behavior:"smooth"});
                },150);
              }}
                style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"6px 2px",borderRadius:8,cursor:"pointer",background:isToday?"linear-gradient(135deg,#E8A830,#C88820)":isSelected?"rgba(232,168,48,0.18)":"transparent",border:isSelected&&!isToday?"1px solid rgba(232,168,48,0.5)":"1px solid transparent",minHeight:36,transition:"all 0.12s"}}>
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:15,color:isToday?"#111213":isSelected?"#E8A830":"#F0F0F0",lineHeight:1}}>{day}</span>
                {dot&&<div style={{width:3,height:3,borderRadius:"50%",background:isToday?"#111213":dot,marginTop:2}}/>}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── Year view ─────────────────────────────────────────────────────────────
  if(calendarView==="year"){
    return(
      <div style={{marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <button onClick={()=>setCalendarYear(y=>y-1)} style={{background:"transparent",border:"1px solid #2A2B2E",borderRadius:8,color:"#7A7D85",width:32,height:32,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:22,color:"#E8A830"}}>{calendarYear}</span>
          <button onClick={()=>setCalendarYear(y=>y+1)} style={{background:"transparent",border:"1px solid #2A2B2E",borderRadius:8,color:"#7A7D85",width:32,height:32,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
          {SHORT_MONTHS.map((m,i)=>{
            const isCurrentMonth=i===todayMonth&&calendarYear===todayYear;
            const isSelectedMonth=i===calendarMonth;
            const hasDot=supplements.some(s=>{const ro=localISO(calcRunOut(s));return ro.startsWith(`${calendarYear}-${String(i+1).padStart(2,"0")}`);});
            return(
              <button key={i} onClick={()=>{setCalendarMonth(i);setCalendarView("month");}}
                style={{padding:"10px 4px",borderRadius:10,cursor:"pointer",background:isCurrentMonth?"linear-gradient(135deg,#E8A830,#C88820)":isSelectedMonth?"rgba(232,168,48,0.12)":"#1C1D1F",border:isCurrentMonth?"none":isSelectedMonth?"1px solid rgba(232,168,48,0.4)":"1px solid #2A2B2E",display:"flex",flexDirection:"column",alignItems:"center",gap:3,transition:"all 0.12s"}}>
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:16,color:isCurrentMonth?"#111213":"#F0F0F0"}}>{m}</span>
                {hasDot&&<div style={{width:3,height:3,borderRadius:"50%",background:isCurrentMonth?"#111213":"#E8A830"}}/>}
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  // ── Strip view (default) ──────────────────────────────────────────────────
  return(
    <div style={{position:"relative",marginBottom:18}}>
      {/* Sticky today pill — appears when today scrolls off to the left */}
      {todayOffscreen&&(
        <div onClick={()=>{onDateSelect(todayStr);scrollToToday();}}
          style={{position:"absolute",left:0,top:0,bottom:12,zIndex:10,display:"flex",alignItems:"center",pointerEvents:"auto"}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,minWidth:40,padding:"8px 4px",borderRadius:10,cursor:"pointer",background:"linear-gradient(135deg,#E8A830,#C88820)",flexShrink:0,boxShadow:"4px 0 12px rgba(0,0,0,0.4)"}}>
            <span style={{fontFamily:"'Space Mono',monospace",fontSize:9,letterSpacing:"0.5px",textTransform:"uppercase",color:"#111213"}}>{DAY_NAMES[now.getDay()]}</span>
            <span style={{fontFamily:"'Barlow Condensed',monospace",fontWeight:700,fontSize:16,lineHeight:1,color:"#111213"}}>{now.getDate()}</span>
            <div style={{width:4,height:4,borderRadius:"50%",background:"#111213"}}/>
          </div>
          {/* fade edge so it blends into the strip */}
          <div style={{width:20,height:"100%",background:"linear-gradient(90deg,rgba(17,18,19,0.6),transparent)",marginLeft:2,pointerEvents:"none"}}/>
        </div>
      )}
      <div ref={stripRef} className="cal-bar">
        {days.map((d,i)=>{
          const iso=localISO(d);
          const isToday=iso===todayStr;
          const isFuture=d>now;
          const isPast=d<now;
          const dateState=getDateState(iso,isPast);
          const isSelected=selectedDate===iso;
          const isLocked=lockedDate===iso&&iso!==todayStr;
          const dotColor=isToday?"#111213":dateState==="full"?"#5BAD72":"#E8A830";
          const bgColor=isLocked?"rgba(232,168,48,0.22)":isSelected&&!isToday?"rgba(232,168,48,0.18)":isToday?"linear-gradient(135deg,#E8A830,#C88820)":dateState==="full"?"rgba(91,173,114,0.12)":dateState==="partial"?"rgba(232,168,48,0.08)":"transparent";
          const borderColor=isLocked?"1px solid rgba(232,168,48,0.7)":isSelected&&!isToday?"1px solid rgba(232,168,48,0.6)":dateState==="full"&&!isToday?"1px solid rgba(91,173,114,0.25)":dateState==="partial"&&!isToday?"1px solid rgba(232,168,48,0.2)":"1px solid transparent";
          return(
            <div key={i} data-iso={iso} ref={isToday?todayRef:null} onClick={()=>onDateSelect(iso)}
              style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,minWidth:40,padding:"8px 4px",borderRadius:10,cursor:"pointer",flexShrink:0,transition:"all 0.15s",background:bgColor,border:borderColor,opacity:isPast&&dateState==="none"&&!isSelected?0.4:1}}>
              <span style={{fontFamily:"'Space Mono',monospace",fontSize:9,letterSpacing:"0.5px",textTransform:"uppercase",color:isToday?"#111213":isLocked?"#E8A830":isSelected?"#E8A830":"#7A7D85"}}>{DAY_NAMES[d.getDay()]}</span>
              <span style={{fontFamily:"'Barlow Condensed',monospace",fontWeight:700,fontSize:16,lineHeight:1,color:isToday?"#111213":isLocked?"#E8A830":isSelected?"#E8A830":"#F0F0F0"}}>{d.getDate()}</span>
              {(isPast&&dateState!=="none")&&<div style={{width:4,height:4,borderRadius:"50%",background:dotColor}}/>}
              {isToday&&<div style={{width:4,height:4,borderRadius:"50%",background:"#111213"}}/>}
              {isFuture&&futureRunOuts[iso]&&<div style={{width:4,height:4,borderRadius:"50%",background:futureRunOuts[iso]}}/>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── DateLogModal ──────────────────────────────────────────────────────────────
function DateLogModal({date,supplements,logs,onClose,onSaveLog,onEditLog,onDeleteLog,onDeleteSupp}){
  const dateObj=new Date(date+"T00:00:00");
  const dateLabel=dateObj.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  const todayStr=todayISO();
  const isToday=date===todayStr;
  const isFuture=date>todayStr;
  const isPast=date<todayStr;

  const dateLogs=logs.filter(l=>{
    try{return(toISODate(l.date)||toISODate(l.ts))===date;}catch{return false;}
  });

  const supplementsForDate=supplements.filter(s=>{
    const created=toISODate(s.createdAt);
    const depleted=(s.totalAmount-(s.consumed||0))<=0||s.discontinued===true;
    return created&&created<=date&&!depleted;
  });

  const loggedSuppIds=new Set(dateLogs.map(l=>l.suppId));
  const [addingFor,setAddingFor]=useState(null);
  const [editingLog,setEditingLog]=useState(null);
  const [editingFor,setEditingFor]=useState(null);
  const [quickTaken,setQuickTaken]=useState(true);
  const [quickScoops,setQuickScoops]=useState(1);
  const [quickCustomAmt,setQuickCustomAmt]=useState("");
  const [quickUseCustom,setQuickUseCustom]=useState(false);
  const [quickNotes,setQuickNotes]=useState("");
  const [quickFeel,setQuickFeel]=useState({energy:null,recovery:null,mood:null,sleep:null});
  const [quickFeelChanged,setQuickFeelChanged]=useState(false);

  // Check if a feel score already exists for this date (from storage or logs)
  const dateFeelStored=(()=>{
    const feels=load(FEEL_KEY,[]);
    const stored=feels.find(f=>f.date===date);
    if(stored&&(stored.energy||stored.recovery||stored.mood||stored.sleep))
      return{energy:stored.energy,recovery:stored.recovery,mood:stored.mood,sleep:stored.sleep};
    const logsWithFeel=dateLogs.filter(l=>l.feel&&(l.feel.energy||l.feel.recovery||l.feel.mood||l.feel.sleep));
    if(logsWithFeel.length)return logsWithFeel[logsWithFeel.length-1].feel;
    return null;
  })();

  const handleQuickLog=(supp,existingLog=null)=>{
    if(existingLog){setEditingFor(supp);}else{setAddingFor(supp);}
    setQuickTaken(existingLog?existingLog.taken:true);
    setQuickScoops(existingLog?Math.round(existingLog.amount/(supp.servingSize||1)):1);
    setQuickCustomAmt(existingLog?String(existingLog.amount):String(supp.servingSize));
    setQuickUseCustom(false);
    setQuickNotes(existingLog?existingLog.notes||"":"");
    setQuickFeel(existingLog?.feel||dateFeelStored||{energy:null,recovery:null,mood:null,sleep:null});
    setQuickFeelChanged(false);
    setEditingLog(existingLog||null);
  };
  const confirmQuickLog=()=>{
    // activeSupp covers both new-log (addingFor) and edit (editingFor) modes
    const activeSupp=addingFor||editingFor;
    if(!activeSupp)return;
    const amount=quickTaken?(quickUseCustom?parseFloat(quickCustomAmt)||activeSupp.servingSize:activeSupp.servingSize*quickScoops):0;
    const feelToSave=dateFeelStored&&!quickFeelChanged?dateFeelStored:quickFeel;
    if(editingLog){
      // Edit mode: replace existing log
      onEditLog(editingLog,{suppId:activeSupp.id,date,taken:quickTaken,amount,notes:quickNotes,feel:feelToSave,ts:editingLog.ts,backdated:true});
    } else {
      onSaveLog({suppId:activeSupp.id,date,taken:quickTaken,amount,notes:quickNotes,feel:feelToSave,ts:new Date(date+"T12:00:00").getTime(),backdated:true});
    }
    setAddingFor(null);
    setEditingFor(null);
    setEditingLog(null);
  };

  // ── Feel score helpers ────────────────────────────────────────────────────
  // Get previous day's logs to compare feel
  const prevDate=(()=>{const d=new Date(date+"T00:00:00");d.setDate(d.getDate()-1);return localISO(d);})();
  const prevLogs=logs.filter(l=>{try{return(toISODate(l.date)||toISODate(l.ts))===prevDate;}catch{return false;}});

  const storedFeels=load("suppstackd_v1_feels",[]);

  const getAvgFeelForDate=(targetDate,targetLogs)=>{
    const scores=targetLogs.map(l=>{
      if(!l.feel)return null;
      const vals=Object.values(l.feel).filter(v=>typeof v==="number");
      return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
    }).filter(v=>v!==null);
    if(scores.length)return scores.reduce((a,b)=>a+b,0)/scores.length;
    const stored=storedFeels.find(f=>f.date===targetDate);
    if(!stored)return null;
    const vals=["energy","recovery","mood","sleep"].map(k=>stored[k]).filter(v=>typeof v==="number");
    return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
  };

  const avgFeel=getAvgFeelForDate(date,dateLogs);
  const prevAvgFeel=getAvgFeelForDate(prevDate,prevLogs);

  const feelEmoji=(score)=>{if(score>=4.5)return"🔥";return"";};
  const feelLabel=(score)=>{if(score>=4.5)return"Great";if(score>=3.5)return"Good";if(score>=2.5)return"Okay";if(score>=1.5)return"Low";return"Poor";};
  const feelColor=(score)=>{if(score>=3.5)return"#5BAD72";if(score>=2.5)return"#E8A830";return"#C0392B";};

  // Per-supplement feel change highlights
  const suppFeelChanges=dateLogs.map(log=>{
    if(!log.feel)return null;
    const vals=Object.values(log.feel).filter(v=>typeof v==="number");
    if(!vals.length)return null;
    const score=vals.reduce((a,b)=>a+b,0)/vals.length;
    const prev=prevLogs.find(l=>l.suppId===log.suppId);
    if(!prev||!prev.feel)return{log,score,delta:null};
    const prevVals=Object.values(prev.feel).filter(v=>typeof v==="number");
    if(!prevVals.length)return{log,score,delta:null};
    const prevScore=prevVals.reduce((a,b)=>a+b,0)/prevVals.length;
    return{log,score,delta:score-prevScore};
  }).filter(Boolean);

  const feelChanged=suppFeelChanges.some(f=>f.delta!==null&&Math.abs(f.delta)>=0.5);

  return(
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-box" style={{padding:"18px 20px",maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <div>
            <p style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:9,letterSpacing:"1.5px",margin:"0 0 4px"}}>{isFuture?"UPCOMING":isToday?"TODAY":"PAST DATE"}</p>
            <h2 style={{fontSize:17,fontWeight:700,color:"#F0F0F0",margin:0,lineHeight:1.3}}>{dateLabel}</h2>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:20,fontWeight:700,color:"#E8A830",lineHeight:1,padding:"2px 4px"}}>✕</button>
        </div>

        {/* ── Daily feel score strip (past/today with logs) ── */}
        {(isPast||isToday)&&avgFeel!==null&&(
          <div style={{marginBottom:16}}>
            <div style={{background:"#111213",border:"1px solid #2A2B2E",borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                {feelEmoji(avgFeel)&&<span style={{fontSize:22}}>{feelEmoji(avgFeel)}</span>}
                <div>
                  <div style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:8,letterSpacing:"1px",marginBottom:2}}>DAILY FEEL</div>
                  <div style={{display:"flex",alignItems:"baseline",gap:6}}>
                    <span style={{color:feelColor(avgFeel),fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:18,letterSpacing:"0.5px"}}>{feelLabel(avgFeel)}</span>
                    <span style={{color:"#4A4B4F",fontFamily:"'Space Mono',monospace",fontSize:10,fontWeight:700}}>{avgFeel.toFixed(1)}/5</span>
                  </div>
                </div>
              </div>
              <div style={{display:"flex",gap:4,alignItems:"center"}}>
                {[1,2,3,4,5].map(i=>(
                  <div key={i} style={{width:8,height:8,borderRadius:"50%",background:i<=Math.round(avgFeel)?feelColor(avgFeel):"#2A2B2E",transition:"background 0.2s"}}/>
                ))}
              </div>
              {prevAvgFeel!==null&&(()=>{
                  const up=avgFeel>prevAvgFeel,dn=avgFeel<prevAvgFeel;
                  const delta=Math.abs(avgFeel-prevAvgFeel);
                  return(
                    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end"}}>
                      <div style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:8,letterSpacing:"0.5px",marginBottom:2}}>VS PREV DAY</div>
                      <div style={{color:up?"#5BAD72":dn?"#C0392B":"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:700}}>
                        {up?"↑":dn?"↓":"—"}{delta>0?` ${delta.toFixed(1)}`:""}
                      </div>
                    </div>
                  );
                })()}
            </div>

          </div>
        )}

        {/* ── Future date: run-out info with urgency colours ── */}
        {isFuture&&(()=>{
          const runOutOnDate=supplements.filter(s=>localISO(calcRunOut(s))===date);
          return(
            <div>
              {runOutOnDate.map(s=>{
                const days=daysFromNow(calcRunOut(s));
                const col=urgencyColor(days);
                const colBg=col==="#C0392B"?"rgba(192,57,43,0.08)":col==="#E8A830"?"rgba(232,168,48,0.07)":"rgba(91,173,114,0.07)";
                const colBorder=col==="#C0392B"?"rgba(192,57,43,0.3)":col==="#E8A830"?"rgba(232,168,48,0.25)":"rgba(91,173,114,0.25)";
                return(
                  <div key={s.id} style={{background:colBg,border:`1px solid ${colBorder}`,borderRadius:10,padding:"12px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <p style={{color:col,fontFamily:"'Space Mono',monospace",fontSize:9,fontWeight:700,letterSpacing:"1px",margin:"0 0 4px"}}>RUNS OUT THIS DATE</p>
                      <span style={{color:"#F0F0F0",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:16}}>{s.name}</span>
                    </div>
                    <span style={{color:col,fontFamily:"'Space Mono',monospace",fontSize:10,fontWeight:700,padding:"4px 8px",border:`1px solid ${colBorder}`,borderRadius:6}}>{urgencyLabel(days)}</span>
                  </div>
                );
              })}
              <div style={{background:"rgba(232,168,48,0.07)",border:"1px solid rgba(232,168,48,0.2)",borderRadius:10,padding:"12px 14px",marginBottom:16}}>
                <p style={{color:"#E8A830",fontFamily:"'Space Mono',monospace",fontSize:11,margin:0,lineHeight:1.6}}>This date is in the future. You can pre-log supplements here if you want to plan ahead.</p>
              </div>
            </div>
          );
        })()}

        {dateLogs.length>0&&(
          <div style={{marginBottom:16}}>
            <span style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:10,letterSpacing:"1.5px",display:"block",marginBottom:8}}>LOGGED</span>
            {dateLogs.map((log,i)=>{
              const supp=supplements.find(s=>s.id===log.suppId);
              const isEditingThis=editingFor?.id===log.suppId&&editingLog?.ts===log.ts;
              if(isEditingThis&&supp){return(
                <div key={i} style={{background:"rgba(232,168,48,0.06)",border:"1px solid rgba(232,168,48,0.3)",borderRadius:9,padding:"12px 14px",marginBottom:8}}>
                  <p style={{margin:"0 0 10px",color:"#E8A830",fontWeight:700,fontSize:13,fontFamily:"'Space Mono',monospace"}}>{supp.name}</p>
                  <span style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:9,letterSpacing:"1px",display:"block",marginBottom:6}}>DID YOU TAKE IT?</span>
                  <div style={{display:"flex",gap:8,marginBottom:12}}>
                    {[true,false].map(v=>(<button key={String(v)} onClick={()=>setQuickTaken(v)} style={{flex:1,padding:"7px 0",borderRadius:8,cursor:"pointer",fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:11,border:quickTaken===v?`1px solid ${v?"#5BAD72":"#C0392B"}`:"1px solid #2A2B2E",background:quickTaken===v?(v?"rgba(91,173,114,0.1)":"rgba(192,57,43,0.1)"):"transparent",color:quickTaken===v?(v?"#5BAD72":"#C0392B"):"#7A7D85",transition:"all 0.15s"}}>{v?"YES":"SKIPPED"}</button>))}
                  </div>
                  {quickTaken&&<>
                    <span style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:9,letterSpacing:"1px",display:"block",marginBottom:6}}>AMOUNT</span>
                    <div style={{display:"flex",gap:8,marginBottom:10}}>
                      {[false,true].map(c=>(<button key={String(c)} onClick={()=>setQuickUseCustom(c)} style={{flex:1,padding:"6px 0",borderRadius:7,cursor:"pointer",border:quickUseCustom===c?"1px solid #E8A830":"1px solid #2A2B2E",background:quickUseCustom===c?"rgba(232,168,48,0.07)":"transparent",color:quickUseCustom===c?"#E8A830":"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:10}}>{c?`CUSTOM (${supp.unit})`:"SCOOPS"}</button>))}
                    </div>
                    {!quickUseCustom?(<div style={{display:"flex",alignItems:"center",gap:14,justifyContent:"center",marginBottom:10}}>
                      <button onClick={()=>setQuickScoops(Math.max(0.5,quickScoops-0.5))} style={{width:36,height:36,borderRadius:"50%",border:"1px solid #2A2B2E",background:"#111213",color:"#F0F0F0",cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>−</button>
                      <div style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:800,color:"#E8A830",fontFamily:"'Space Mono',monospace"}}>{quickScoops}</div><div style={{fontSize:10,color:"#7A7D85",fontFamily:"'Space Mono',monospace"}}>= {(supp.servingSize*quickScoops).toFixed(1)}{supp.unit}</div></div>
                      <button onClick={()=>setQuickScoops(quickScoops+0.5)} style={{width:36,height:36,borderRadius:"50%",border:"1px solid #2A2B2E",background:"#111213",color:"#F0F0F0",cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button>
                    </div>):(<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}><input type="number" value={quickCustomAmt} onChange={e=>setQuickCustomAmt(e.target.value)} className="inp" style={{flex:1,fontSize:18,textAlign:"center"}}/><span style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace"}}>{supp.unit}</span></div>)}
                    <div style={{background:"#111213",borderRadius:7,padding:"6px 10px",display:"flex",justifyContent:"space-between",marginBottom:10}}>
                      <span style={{color:"#7A7D85",fontSize:11,fontFamily:"'Space Mono',monospace"}}>DEDUCTING</span>
                      <span style={{color:"#E8A830",fontWeight:700,fontFamily:"'Space Mono',monospace"}}>{(quickUseCustom?parseFloat(quickCustomAmt)||0:supp.servingSize*quickScoops).toFixed(1)}{supp.unit}</span>
                    </div>
                  </>}
                  <input className="inp" placeholder="Notes (optional)" value={quickNotes} onChange={e=>setQuickNotes(e.target.value)} style={{marginBottom:10}}/>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>{setEditingFor(null);setEditingLog(null);}} className="btn-cancel" style={{flex:1,padding:"8px 0",fontSize:11}}>Cancel</button>
                    <button onClick={confirmQuickLog} className="btn-primary" style={{flex:2,padding:"8px 0",fontSize:11}}>SAVE LOG</button>
                  </div>
                </div>
              );}
              return(
                <div key={i} style={{background:log.taken?"#111213":"rgba(232,168,48,0.05)",border:log.taken?"1px solid #2A2B2E":"1px solid rgba(232,168,48,0.18)",borderLeft:log.taken?"1px solid #2A2B2E":"3px solid rgba(232,168,48,0.4)",borderRadius:9,padding:"10px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{margin:0,color:log.taken?"#F0F0F0":"#C8A84B",fontWeight:700,fontSize:13}}>{supp?.name||"Unknown"}{supp?.removed&&<span style={{color:"#4A4B4F",fontSize:9,fontFamily:"'Space Mono',monospace",marginLeft:6}}>[removed]</span>}</p>
                    <p style={{margin:"2px 0 0",color:log.taken?"#7A7D85":"rgba(200,168,75,0.7)",fontFamily:"'Space Mono',monospace",fontSize:10}}>{log.taken?`${log.amount} ${supp?.unit||""} taken`:"⚠ Skipped"}{log.notes?` · ${log.notes}`:""}</p>
                  </div>
                  <div style={{display:"flex",gap:6,flexShrink:0}}>
                    {supp&&!supp.removed&&<button onClick={()=>handleQuickLog(supp,log)} style={{background:"rgba(232,168,48,0.07)",border:"1px solid rgba(232,168,48,0.3)",borderRadius:7,padding:"4px 10px",color:"#E8A830",fontFamily:"'Space Mono',monospace",fontSize:10,cursor:"pointer"}}>EDIT</button>}
                    <button onClick={()=>onDeleteLog(log)} style={{background:"transparent",border:"1px solid #2A2B2E",borderRadius:7,padding:"4px 10px",color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:10,cursor:"pointer"}}>REMOVE</button>
                  </div>
                </div>
              );
            })}
          </div>
        )}
        {supplementsForDate.filter(s=>!loggedSuppIds.has(s.id)).length>0&&(
          <div>
            <span style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:10,letterSpacing:"1.5px",display:"block",marginBottom:8}}>{dateLogs.length>0?"NOT LOGGED":"SUPPLEMENTS"}</span>
            {supplementsForDate.filter(s=>!loggedSuppIds.has(s.id)).map((supp,i)=>(
              <div key={i}>
                {addingFor?.id===supp.id?(
                  <div style={{background:"rgba(232,168,48,0.06)",border:"1px solid rgba(232,168,48,0.3)",borderRadius:9,padding:"12px 14px",marginBottom:8}}>
                    <p style={{margin:"0 0 10px",color:"#E8A830",fontWeight:700,fontSize:13,fontFamily:"'Space Mono',monospace"}}>{supp.name}</p>
                    {/* Taken / Skipped */}
                    <span style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:9,letterSpacing:"1px",display:"block",marginBottom:6}}>DID YOU TAKE IT?</span>
                    <div style={{display:"flex",gap:8,marginBottom:12}}>
                      {[true,false].map(v=>(
                        <button key={String(v)} onClick={()=>setQuickTaken(v)} style={{flex:1,padding:"7px 0",borderRadius:8,cursor:"pointer",fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:11,border:quickTaken===v?`1px solid ${v?"#5BAD72":"#C0392B"}`:"1px solid #2A2B2E",background:quickTaken===v?(v?"rgba(91,173,114,0.1)":"rgba(192,57,43,0.1)"):"transparent",color:quickTaken===v?(v?"#5BAD72":"#C0392B"):"#7A7D85",transition:"all 0.15s"}}>{v?"YES":"SKIPPED"}</button>
                      ))}
                    </div>
                    {quickTaken&&<>
                      {/* Amount mode */}
                      <span style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:9,letterSpacing:"1px",display:"block",marginBottom:6}}>AMOUNT</span>
                      <div style={{display:"flex",gap:8,marginBottom:10}}>
                        {[false,true].map(c=>(
                          <button key={String(c)} onClick={()=>setQuickUseCustom(c)} style={{flex:1,padding:"6px 0",borderRadius:7,cursor:"pointer",border:quickUseCustom===c?"1px solid #E8A830":"1px solid #2A2B2E",background:quickUseCustom===c?"rgba(232,168,48,0.07)":"transparent",color:quickUseCustom===c?"#E8A830":"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:10}}>{c?`CUSTOM (${supp.unit})`:"SCOOPS"}</button>
                        ))}
                      </div>
                      {!quickUseCustom?(
                        <div style={{display:"flex",alignItems:"center",gap:14,justifyContent:"center",marginBottom:10}}>
                          <button onClick={()=>setQuickScoops(Math.max(0.5,quickScoops-0.5))} style={{width:36,height:36,borderRadius:"50%",border:"1px solid #2A2B2E",background:"#111213",color:"#F0F0F0",cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>−</button>
                          <div style={{textAlign:"center"}}>
                            <div style={{fontSize:22,fontWeight:800,color:"#E8A830",fontFamily:"'Space Mono',monospace"}}>{quickScoops}</div>
                            <div style={{fontSize:10,color:"#7A7D85",fontFamily:"'Space Mono',monospace"}}>= {(supp.servingSize*quickScoops).toFixed(1)}{supp.unit}</div>
                          </div>

                    {/* Notes */}

                    <div style={{display:"flex",gap:8}}>

                  <div style={{background:"#111213",border:"1px solid #2A2B2E",borderRadius:9,padding:"10px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <p style={{margin:0,color:"#7A7D85",fontWeight:700,fontSize:13}}>{supp.name}</p>
                      <p style={{margin:"2px 0 0",color:"#4A4B4F",fontFamily:"'Space Mono',monospace",fontSize:10}}>{supp.servingSize}{supp.unit}/serving</p>
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      <button onClick={()=>handleQuickLog(supp)} style={{background:"rgba(232,168,48,0.08)",border:"1px solid rgba(232,168,48,0.3)",borderRadius:7,padding:"6px 12px",color:"#E8A830",fontFamily:"'Space Mono',monospace",fontSize:10,fontWeight:700,cursor:"pointer",letterSpacing:"0.5px"}}>+ LOG</button>
                      {(isToday||isFuture)&&onDeleteSupp&&<button onClick={()=>{if(window.confirm("Delete "+supp.name+"? This cannot be undone."))onDeleteSupp(supp.id);}} style={{background:"transparent",border:"1px solid rgba(192,57,43,0.3)",borderRadius:7,padding:"6px 10px",color:"#C0392B",fontFamily:"'Space Mono',monospace",fontSize:10,fontWeight:700,cursor:"pointer"}}>DELETE</button>}
                    </div>
                  </div>
                )}
              </div>
            ))}

        {supplementsForDate.length===0&&(
          <p style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:12,textAlign:"center",padding:"24px 0"}}>No supplements were in your stack on this date.</p>
        )}
        <button onClick={onClose} style={{width:"100%",marginTop:8,padding:"10px",background:"transparent",border:"1px solid #2A2B2E",borderRadius:9,color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:12,cursor:"pointer"}}>CLOSE</button>
      </div>
    </div>
  );
}

// ── PhotoCropEditor ───────────────────────────────────────────────────────────
function PhotoCropEditor({src,onConfirm,onCancel}){
  const canvasRef=useRef(null);
  const imgRef=useRef(null);
  const stateRef=useRef({offsetX:0,offsetY:0,scale:1,initScale:1,dragging:false,lastX:0,lastY:0,lastDist:0,pinching:false,rafId:null});
  const SIZE=280;
  const EXPORT_SIZE=900;
  const DPR=typeof window!=="undefined"?(window.devicePixelRatio||1):1;

  // Draw directly from stateRef — no React re-renders in the hot path
  const draw=()=>{
    const canvas=canvasRef.current;
    const img=imgRef.current;
    if(!canvas||!img)return;
    const ctx=canvas.getContext("2d");
    const {offsetX,offsetY,scale}=stateRef.current;
    // Use DPR-scaled coordinates for crisp rendering
    const S=SIZE*DPR;
    ctx.clearRect(0,0,S,S);
    const iw=img.width*scale,ih=img.height*scale;
    ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';ctx.drawImage(img,S/2-iw/2+offsetX*DPR,S/2-ih/2+offsetY*DPR,iw,ih);
    // Subtle dim only outside circle — image stays visible underneath
    ctx.save();
    ctx.beginPath();
    ctx.rect(0,0,S,S);
    ctx.arc(S/2,S/2,S/2-2,0,Math.PI*2,true);
    ctx.closePath();
    ctx.fillStyle="rgba(0,0,0,0.42)";
    ctx.fill();
    ctx.restore();
    // Gold ring
    ctx.strokeStyle="#E8A830";ctx.lineWidth=2.5*DPR;
    ctx.beginPath();ctx.arc(S/2,S/2,S/2-2,0,Math.PI*2);ctx.stroke();
  };

  const scheduleDraw=()=>{
    if(stateRef.current.rafId)cancelAnimationFrame(stateRef.current.rafId);
    stateRef.current.rafId=requestAnimationFrame(draw);
  };

  useEffect(()=>{
    const img=new Image();
    img.onload=()=>{
      imgRef.current=img;
      // cover-fit: fill the circle at minimum zoom so no empty space
      const s=Math.max((SIZE*DPR)/img.width,(SIZE*DPR)/img.height);
      stateRef.current.scale=s;
      stateRef.current.initScale=s;
      stateRef.current.offsetX=0;
      stateRef.current.offsetY=0;
      draw();
    };
    img.src=src;
    return()=>{if(stateRef.current.rafId)cancelAnimationFrame(stateRef.current.rafId);};
  },[src]);

  const handleReset=()=>{
    const s=stateRef.current;
    s.scale=s.initScale;s.offsetX=0;s.offsetY=0;
    scheduleDraw();
  };

  // ── Mouse ──
  const onMouseDown=e=>{const s=stateRef.current;s.dragging=true;s.lastX=e.clientX;s.lastY=e.clientY;};
  const onMouseMove=e=>{
    const s=stateRef.current;
    if(!s.dragging)return;
    s.offsetX+=e.clientX-s.lastX;s.offsetY+=e.clientY-s.lastY;
    s.lastX=e.clientX;s.lastY=e.clientY;
    scheduleDraw();
  };
  const onMouseUp=()=>{stateRef.current.dragging=false;};

  // ── Touch ──
  const getDist=(t)=>{const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy);};
  const onTouchStart=e=>{
    e.preventDefault();
    const s=stateRef.current;
    if(e.touches.length===2){s.pinching=true;s.dragging=false;s.lastDist=getDist(e.touches);}
    else{s.pinching=false;s.dragging=true;s.lastX=e.touches[0].clientX;s.lastY=e.touches[0].clientY;}
  };
  const onTouchMove=e=>{
    e.preventDefault();
    const s=stateRef.current;
    if(e.touches.length===2&&s.pinching){
      const dist=getDist(e.touches);
      if(s.lastDist>0){const ratio=dist/s.lastDist;const next=Math.max(s.initScale,Math.min(s.initScale*8,s.scale*ratio));s.scale=next;}
      s.lastDist=dist;
      scheduleDraw();
    } else if(e.touches.length===1&&s.dragging&&!s.pinching){
      s.offsetX+=e.touches[0].clientX-s.lastX;s.offsetY+=e.touches[0].clientY-s.lastY;
      s.lastX=e.touches[0].clientX;s.lastY=e.touches[0].clientY;
      scheduleDraw();
    }
  };
  const onTouchEnd=e=>{
    const s=stateRef.current;
    if(e.touches.length<2)s.pinching=false;
    if(e.touches.length===0)s.dragging=false;
  };

  const handleConfirm=()=>{
    const out=document.createElement("canvas");out.width=EXPORT_SIZE;out.height=EXPORT_SIZE;
    const ctx=out.getContext("2d");
    const {offsetX,offsetY,scale:s}=stateRef.current;
    const img=imgRef.current;
    const visW=SIZE*DPR/s;
    const visH=SIZE*DPR/s;
    const cx=img.width/2 - (offsetX*DPR)/s;
    const cy=img.height/2 - (offsetY*DPR)/s;
    const srcX=cx-visW/2;
    const srcY=cy-visH/2;
    ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
    ctx.drawImage(img,srcX,srcY,visW,visH,0,0,EXPORT_SIZE,EXPORT_SIZE);
    onConfirm(out.toDataURL("image/jpeg",0.97));
  };

  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
      <p style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:10,letterSpacing:"0.8px",textAlign:"center",margin:0}}>DRAG TO REPOSITION · PINCH TO ZOOM</p>
      <canvas ref={canvasRef} width={SIZE*DPR} height={SIZE*DPR}
        style={{borderRadius:"50%",cursor:"grab",touchAction:"none",display:"block",width:SIZE,height:SIZE,maxWidth:"100%"}}
        onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}/>
      <div style={{display:"flex",gap:8,width:"100%"}}>
        <button onClick={onCancel} className="btn-cancel" style={{flex:1}}>CANCEL</button>
        <button onClick={handleReset} style={{flex:1,padding:12,borderRadius:10,border:"1px solid #3A3B3E",background:"transparent",color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:12,cursor:"pointer"}}>RESET</button>
        <button onClick={handleConfirm} className="btn-primary" style={{flex:2}}>USE PHOTO</button>
      </div>
    </div>
  );
}

// ── ProfileOnboarding ─────────────────────────────────────────────────────────
function ProfileOnboarding({onComplete}){
  const MM="'Space Mono',monospace";
  const BC="'Barlow Condensed',sans-serif";
  const [step,setStep]=useState(0);
  const [profile,setProfile]=useState({name:"",email:"",age:"",currency:""});
  const [photoPreview,setPhotoPreview]=useState(null);
  const [cropSrc,setCropSrc]=useState(null);
  const [verifyCode,setVerifyCode]=useState("");
  const [enteredCode,setEnteredCode]=useState("");
  const [codeError,setCodeError]=useState("");
  const [codeSent,setCodeSent]=useState(false);
  const [sendingCode,setSendingCode]=useState(false);
  const [verifying,setVerifying]=useState(false);
  const [codeExpiry,setCodeExpiry]=useState(null);
  const photoInputRef=useRef(null);
  const set=(k,v)=>setProfile(p=>({...p,[k]:v}));
  const step1Valid=profile.name.trim()&&profile.email.trim()&&profile.age.trim()&&profile.currency;
  const isValidEmail=e=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);

  const sendVerificationCode=async()=>{
    if(!isValidEmail(profile.email)){setCodeError("Please enter a valid email address.");return;}
    setSendingCode(true);setCodeError("");
    const code=String(Math.floor(100000+Math.random()*900000));
    setVerifyCode(code);
    setCodeExpiry(Date.now()+10*60*1000); // 10 min expiry
    try{
      await fetch("https://app.loops.so/api/v1/transactional",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":"Bearer 9b317c478ed0ac5b735ceeef487848ec"},
        body:JSON.stringify({
          transactionalId:"suppstackd-verify",
          email:profile.email,
          dataVariables:{code,name:profile.name||"there"}
        })
      });
      setCodeSent(true);
      setStep(2);
    }catch(e){
      setCodeError("Failed to send code. Check your email and try again.");
    }
    setSendingCode(false);
  };

  const verifyEmailCode=()=>{
    setVerifying(true);setCodeError("");
    if(Date.now()>codeExpiry){setCodeError("Code expired. Tap Resend to get a new one.");setVerifying(false);return;}
    if(enteredCode.trim()===verifyCode){
      setVerifying(false);
      setStep(3); // move to photo step
    }else{
      setCodeError("Incorrect code. Please try again.");
      setVerifying(false);
    }
  };

  const finish=(photo)=>{
    const finalProfile={...profile,photo:photo||photoPreview||null};
    onComplete(finalProfile);
  };

  const steps=[
    // Step 0 — Welcome
    <div key={0} style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:"40px 28px",textAlign:"center"}}>
      <h1 style={{fontFamily:BC,fontSize:42,fontWeight:900,color:"#F0F0F0",marginBottom:12,letterSpacing:"-0.5px",lineHeight:1.05}}>Welcome to<br/><span style={{color:"#E8A830"}}>SUPPSTACKD</span></h1>
      <p style={{color:"#7A7D85",fontSize:13,fontFamily:MM,lineHeight:1.8,marginBottom:40}}>Let's set up your profile so we can personalise your experience.</p>
      <button className="btn-primary" style={{width:"100%",padding:16,fontSize:14}} onClick={()=>setStep(1)}>LET'S GO →</button>
    </div>,

    // Step 1 — Profile details + email
    <div key={1} style={{padding:"40px 28px",flex:1,overflowY:"auto"}}>
      <h2 style={{fontFamily:BC,fontSize:30,fontWeight:900,color:"#F0F0F0",marginBottom:6}}>Who are you?</h2>
      <p style={{color:"#7A7D85",fontSize:12,fontFamily:MM,marginBottom:24,lineHeight:1.6}}>All fields required to continue.</p>
      <div className="field"><span className="section-label">FULL NAME *</span><input className="inp" placeholder="Full name" value={profile.name} onChange={e=>set("name",e.target.value)}/></div>
      <div className="field">
        <span className="section-label">EMAIL ADDRESS *</span>
        <input className="inp" type="email" placeholder="your@email.com" value={profile.email} onChange={e=>{set("email",e.target.value);setCodeError("");setCodeSent(false);}}/>
        <p style={{color:"#7A7D85",fontSize:10,fontFamily:MM,marginTop:6,lineHeight:1.5}}>We'll send your weekly supplement debrief and low stock alerts here. A verification code will be sent to confirm.</p>
      </div>
      <div className="field"><span className="section-label">AGE *</span><input className="inp" type="number" placeholder="e.g. 24" value={profile.age} onChange={e=>set("age",e.target.value)}/></div>
      <div className="field"><span className="section-label">CURRENCY *</span><select className="inp" value={profile.currency||""} onChange={e=>set("currency",e.target.value)}><option value="">Select currency</option>{CURRENCY_OPTIONS.map(c=><option key={c.code} value={c.code}>{c.label}</option>)}</select></div>
      {codeError&&<p style={{color:"#E05A5A",fontFamily:MM,fontSize:10,marginBottom:10}}>{codeError}</p>}
      <button
        className="btn-primary"
        style={{width:"100%",padding:14,marginTop:8,opacity:step1Valid&&!sendingCode?1:0.4,cursor:step1Valid&&!sendingCode?"pointer":"not-allowed"}}
        onClick={()=>step1Valid&&!sendingCode&&sendVerificationCode()}
      >
        {sendingCode?"SENDING CODE...":step1Valid?"SEND VERIFICATION CODE →":"FILL IN ALL FIELDS TO CONTINUE"}
      </button>
    </div>,

    // Step 2 — Email verification
    <div key={2} style={{padding:"40px 28px",flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}}>
      <h2 style={{fontFamily:BC,fontSize:30,fontWeight:900,color:"#F0F0F0",marginBottom:6}}>Check your email</h2>
      <p style={{color:"#7A7D85",fontSize:12,fontFamily:MM,marginBottom:8,lineHeight:1.6}}>We sent a 6-digit code to</p>
      <p style={{color:"#E8A830",fontSize:13,fontFamily:MM,marginBottom:24,fontWeight:700}}>{profile.email}</p>
      <div className="field">
        <span className="section-label">ENTER CODE *</span>
        <input
          className="inp"
          type="number"
          placeholder="000000"
          value={enteredCode}
          onChange={e=>setEnteredCode(e.target.value.slice(0,6))}
          style={{textAlign:"center",fontSize:22,letterSpacing:"8px",fontFamily:MM}}
        />
      </div>
      {codeError&&<p style={{color:"#E05A5A",fontFamily:MM,fontSize:10,marginBottom:10}}>{codeError}</p>}
      <button
        className="btn-primary"
        style={{width:"100%",padding:14,marginBottom:12,opacity:enteredCode.length===6&&!verifying?1:0.4,cursor:enteredCode.length===6&&!verifying?"pointer":"not-allowed"}}
        onClick={()=>enteredCode.length===6&&!verifying&&verifyEmailCode()}
      >
        {verifying?"VERIFYING...":"VERIFY EMAIL →"}
      </button>
      <button
        style={{width:"100%",padding:10,background:"transparent",border:"1px solid #2A2B2E",borderRadius:9,color:"#7A7D85",fontFamily:MM,fontSize:10,cursor:"pointer"}}
        onClick={()=>{setCodeSent(false);setEnteredCode("");setCodeError("");setSendingCode(false);sendVerificationCode();}}
      >
        RESEND CODE
      </button>
      <button style={{width:"100%",padding:10,background:"transparent",border:"none",color:"#4A4B4F",fontFamily:MM,fontSize:9,cursor:"pointer",marginTop:8}} onClick={()=>setStep(1)}>
        ← CHANGE EMAIL
      </button>
    </div>,

    // Step 3 — Photo (optional)
    <div key={3} style={{padding:"40px 28px",flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}>
      <h2 style={{fontFamily:BC,fontSize:30,fontWeight:900,color:"#F0F0F0",marginBottom:6,alignSelf:"flex-start"}}>Add a photo</h2>
      <p style={{color:"#7A7D85",fontSize:12,fontFamily:MM,marginBottom:24,lineHeight:1.6,alignSelf:"flex-start"}}>Optional — shows on your profile and share card.</p>
      <input ref={photoInputRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const file=e.target.files?.[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>setCropSrc(ev.target.result);reader.readAsDataURL(file);}}/>
      {cropSrc?(
        <div style={{width:"100%",textAlign:"center"}}>
          <p style={{color:"#7A7D85",fontFamily:MM,fontSize:10,marginBottom:12}}>Crop your photo</p>
          <button className="btn-primary" style={{width:"100%",padding:14,marginBottom:8}} onClick={()=>{setPhotoPreview(cropSrc);setCropSrc(null);}}>USE THIS PHOTO →</button>
          <button style={{width:"100%",padding:10,background:"transparent",border:"1px solid #2A2B2E",borderRadius:9,color:"#7A7D85",fontFamily:MM,fontSize:10,cursor:"pointer"}} onClick={()=>setCropSrc(null)}>CANCEL</button>
        </div>
      ):(
        <>
          {photoPreview?(
            <div style={{width:100,height:100,borderRadius:"50%",overflow:"hidden",marginBottom:20,border:"2px solid #E8A830"}}>
              <img src={photoPreview} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="preview"/>
            </div>
          ):(
            <div onClick={()=>photoInputRef.current?.click()} style={{width:100,height:100,borderRadius:"50%",background:"#1C1D1F",border:"2px dashed #2A2B2E",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:20,cursor:"pointer"}}>
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#4A4B4F" strokeWidth="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            </div>
          )}

// ── ProgressRing ──────────────────────────────────────────────────────────────
function ProgressRing({pct,color,size=58}){
  const r=(size-6)/2,circ=2*Math.PI*r,offset=circ-(Math.min(pct,100)/100)*circ;
  return(<svg width={size} height={size} style={{transform:"rotate(-90deg)"}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#2A2B2E" strokeWidth="5"/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="5" strokeDasharray={circ} strokeDashoffset={offset} style={{transition:"stroke-dashoffset 0.7s ease",strokeLinecap:"round"}}/></svg>);
}

// ── SupplementDetailSheet ─────────────────────────────────────────────────────
function SupplementDetailSheet({supp,logs,onClose,onEdit,onReAdd,profile,readOnly}){
  const sheetRef=useRef(null);
  const dragStartY=useRef(null);
  const dragBlocked=useRef(false);
  const handleTouchStart=(e)=>{
    // Block drag-to-close if touch starts inside a scrollable sub-element
    let el=e.target;
    let insideScroll=false;
    while(el&&el!==sheetRef.current){
      if(el.scrollHeight>el.clientHeight+2&&getComputedStyle(el).overflowY!=='hidden'){
        insideScroll=true;break;
      }
      el=el.parentElement;
    }
    dragBlocked.current=insideScroll;
    dragStartY.current=e.touches[0].clientY;
  };
  const handleTouchMove=(e)=>{
    if(dragStartY.current===null||dragBlocked.current)return;
    const delta=e.touches[0].clientY-dragStartY.current;
    if(delta>0&&sheetRef.current)sheetRef.current.style.transform=`translateY(${delta}px)`;
  };
  const handleTouchEnd=(e)=>{
    if(dragStartY.current===null)return;
    const delta=e.changedTouches[0].clientY-dragStartY.current;
    if(sheetRef.current)sheetRef.current.style.transform="";
    if(!dragBlocked.current&&delta>130)onClose();
    dragStartY.current=null;

  const isDepleted=(supp.totalAmount-(supp.consumed||0))<=0||supp.discontinued===true;

  const dailyCostVal=supp.price&&supp.totalAmount?(supp.price/Math.floor(supp.totalAmount/supp.servingSize))*supp.servingsPerDay:null;

        {isDepleted&&<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12,background:"rgba(74,75,79,0.15)",border:"1px solid #2A2B2E",borderRadius:8,padding:"6px 10px"}}><span style={{fontSize:10,color:"#4A4B4F",fontFamily:"'Space Mono',monospace",letterSpacing:"0.5px"}}>{supp.discontinued?"⬛ DISCONTINUED":"⬛ DEPLETED"}</span></div>}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div>
            <h2 style={{fontSize:20,fontWeight:800,color:isDepleted?"#5A5B5F":"#F0F0F0",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:"-0.3px",margin:0}}>{supp.name}</h2>

            <button onClick={onClose} style={{padding:"5px 10px",borderRadius:8,border:"none",background:"transparent",color:"#7A7D85",fontSize:18,cursor:"pointer",lineHeight:1}}>✕</button>

function StackCardList({displaySupps,onLog,onEdit,onDelete,onView,logs,sortBy}){
  if(sortBy==="type"){
    const groups={};
    displaySupps.forEach(s=>{
      const isDep=s.totalAmount-(s.consumed||0)<=0;
      const grp=isDep?"DEPLETED":normalizeType(s.type)||"Other";
      if(!groups[grp])groups[grp]=[];
      groups[grp].push(s);
    });
    const order=["Powder","Pill","Liquid","Chew","Other","DEPLETED"];
    const sorted=Object.keys(groups).sort((a,b)=>{const ai=order.indexOf(a),bi=order.indexOf(b);return(ai===-1?99:ai)-(bi===-1?99:bi);});
    return(<div style={{paddingBottom:160}}>{sorted.map(grp=>(
      <div key={grp}>
        <div style={{display:"flex",alignItems:"center",gap:8,margin:"14px 0 8px"}}>
          <div style={{flex:1,height:1,background:"#2A2B2E"}}/>
          <span style={{color:"#4A4B4F",fontFamily:"'Space Mono',monospace",fontSize:9,letterSpacing:"1.5px"}}>{grp}</span>
          <div style={{flex:1,height:1,background:"#2A2B2E"}}/>
        </div>
        {groups[grp].map(s=><SupplementCard key={s.id} supp={s} onLog={onLog} onEdit={onEdit} onDelete={onDelete} onView={onView} logs={logs}/>)}
      </div>
    ))}</div>);
  }
  return(<div style={{paddingBottom:160}}>{displaySupps.map(s=><SupplementCard key={s.id} supp={s} onLog={onLog} onEdit={onEdit} onDelete={onDelete} onView={onView} logs={logs}/>)}</div>);
}

function AddEditModal({supp,onClose,onSave,onDelete,onStopTaking,profile}){
  const isEdit=!!supp;
  const [form,setForm]=useState(supp?{...supp,totalAmount:String(supp.totalAmount),servingSize:String(supp.servingSize),servingsPerDay:String(supp.servingsPerDay),consumed:String(supp.consumed),customDate:supp.createdAt||todayISO()}:{name:"",brand:"",type:"Powder",totalAmount:"",unit:"g",servingSize:"",servingsPerDay:"",consumed:"0",lastLogged:null,customDate:todayISO()});
  const [suggestions,setSuggestions]=useState([]);
  const [showSuggestions,setShowSuggestions]=useState(false);
  const [touched,setTouched]=useState({});
  const [submitted,setSubmitted]=useState(false);
  const [alreadyStarted,setAlreadyStarted]=useState(false);
  const [startedMode,setStartedMode]=useState("amount");
  const [amountLeft,setAmountLeft]=useState("");
  const [daysAlready,setDaysAlready]=useState("");
  const [originalForm]=useState(supp?{...supp,totalAmount:String(supp.totalAmount),servingSize:String(supp.servingSize),servingsPerDay:String(supp.servingsPerDay),consumed:String(supp.consumed)}:null);
  const handleUndo=()=>{if(originalForm)setForm({...originalForm});setSubmitted(false);};
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const touch=(k)=>setTouched(t=>({...t,[k]:true}));
  const calcConsumed=()=>{const total=parseFloat(form.totalAmount)||0,serving=parseFloat(form.servingSize)||0,perDay=parseFloat(form.servingsPerDay)||1;if(startedMode==="amount"){const left=parseFloat(amountLeft)||0;return Math.max(0,total-left);}else{const days=parseInt(daysAlready)||0;return Math.min(total,days*serving*perDay);}};
  const effectiveConsumed=!isEdit&&alreadyStarted?calcConsumed():parseFloat(form.consumed)||0;
  const isKg=form.unit==="kg";
  const totalForValidation=isKg?(parseFloat(form.totalAmount)||0)*1000:(parseFloat(form.totalAmount)||0);
  const errors={name:!form.name.trim()?"Supplement name is required":null,totalAmount:!form.totalAmount?"Total amount is required":parseFloat(form.totalAmount)<=0?"Must be greater than 0":null,servingSize:!form.servingSize?"Serving size is required":parseFloat(form.servingSize)<=0?"Must be greater than 0":(!isEdit&&parseFloat(form.servingSize)>totalForValidation)?"Can't exceed total amount":null,servingsPerDay:!form.servingsPerDay?"Servings per day is required":parseFloat(form.servingsPerDay)<=0?"Must be > 0":null,consumed:isEdit&&form.consumed!==""&&parseFloat(form.consumed)>parseFloat(form.totalAmount||0)?"Can't exceed total amount":null};
  const reqFields=["name","totalAmount","servingSize","servingsPerDay"];

  const progPct=Math.round((completed/reqFields.length)*100);
  const showErr=k=>(touched[k]||submitted)&&errors[k];
  const totalNum=parseFloat(form.totalAmount)||0;
  const remaining=totalNum-effectiveConsumed;
  const previewTotal=isKg?(parseFloat(form.totalAmount)||0)*1000:(parseFloat(form.totalAmount)||0);
  const previewRemaining=previewTotal-effectiveConsumed;
  const preview=form.totalAmount&&form.servingSize&&!errors.totalAmount&&!errors.servingSize&&previewRemaining>0?Math.ceil(previewRemaining/((parseFloat(form.servingSize)||1)*(parseFloat(form.servingsPerDay)||1))):null;
  const handleSave=()=>{
    setSubmitted(true);if(!isValid)return;
    const saveUnit=isKg?"g":form.unit;
    const saveTotalAmount=isKg?parseFloat(form.totalAmount)*1000:parseFloat(form.totalAmount);

  };

            <button onClick={onClose} style={{background:"transparent",border:"none",cursor:"pointer",padding:"2px 6px",fontSize:20,fontWeight:700,color:"#E8A830",lineHeight:1}}>✕</button>
          </div>

        </div>

                  <div><span className="section-label">AMOUNT REMAINING IN TUB ({form.unit||"unit"})</span><input type="number" className="inp" placeholder={`e.g. ${Math.round(totalNum*0.5)||250}`} min="0" value={amountLeft} onChange={e=>setAmountLeft(e.target.value)}/>{amountLeft&&totalNum>0&&<p style={{color:"#7A7D85",fontSize:11,fontFamily:"'Space Mono',monospace",marginTop:6}}>≈ {Math.round(calcConsumed())} {form.unit} already used</p>}</div>
                ):(
                  <div><span className="section-label">HOW MANY DAYS HAVE YOU BEEN TAKING IT?</span><input type="number" className="inp" placeholder="e.g. 14" min="0" value={daysAlready} onChange={e=>setDaysAlready(e.target.value)}/>{daysAlready&&<p style={{color:"#7A7D85",fontSize:11,fontFamily:"'Space Mono',monospace",marginTop:6}}>≈ {Math.round(calcConsumed())} {form.unit} used · {Math.max(0,Math.round(totalNum-calcConsumed()))} {form.unit} left</p>}</div>
                )}
              </div>
            )}
          </div>
        )}
        {isEdit&&<div className="field"><span className="section-label">ALREADY CONSUMED ({form.unit}) — ESTIMATE OK</span><input type="number" className={ic("consumed")} min="0" value={form.consumed} onChange={e=>set("consumed",e.target.value)} onBlur={()=>touch("consumed")}/><p style={{color:"#4A4B4F",fontSize:10,fontFamily:"'Space Mono',monospace",marginTop:5}}>Not sure? A rough estimate is fine — this sets your run-out date.</p>{showErr("consumed")&&<div className="err-msg">⚠ {errors.consumed}</div>}</div>}
        {preview!==null&&preview>0&&(
          <div style={{background:"#111213",border:"1px solid rgba(232,168,48,0.2)",borderRadius:10,padding:"12px 16px",marginBottom:18,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><span style={{color:"#7A7D85",fontSize:11,fontFamily:"'Space Mono',monospace",display:"block"}}>ESTIMATED SUPPLY</span>{alreadyStarted&&remaining>0&&<span style={{color:"#7A7D85",fontSize:10,fontFamily:"'Space Mono',monospace"}}>{Math.round(remaining)} {form.unit} remaining</span>}</div>
            <span style={{color:"#E8A830",fontWeight:800,fontFamily:"'Space Mono',monospace",fontSize:18}}>{preview} days</span>
          </div>
        )}
        {submitted&&!isValid&&<div style={{background:"rgba(192,57,43,0.1)",border:"1px solid rgba(192,57,43,0.3)",borderRadius:10,padding:"11px 14px",marginBottom:16}}><p style={{color:"#C0392B",fontSize:12,fontFamily:"'Space Mono',monospace",margin:0}}>Please fix the highlighted fields above before saving.</p></div>}
        <div className="flex gap-10">
          <button className="btn-cancel flex-1" onClick={onClose}>Cancel</button>
          {isEdit&&<button onClick={handleUndo} title="Undo all changes" style={{padding:"12px 14px",borderRadius:10,border:"1px solid rgba(232,168,48,0.3)",background:"rgba(232,168,48,0.06)",color:"#E8A830",fontFamily:"'Space Mono',monospace",fontSize:13,cursor:"pointer",flexShrink:0}}>↩</button>}
          <button onClick={handleSave} style={{flex:2,padding:12,borderRadius:10,cursor:isValid?"pointer":"not-allowed",fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:13,letterSpacing:"0.5px",border:isValid?"none":"1px solid #2A2B2E",background:isValid?"linear-gradient(135deg,#E8A830,#C88820)":"#3A3B3E",color:isValid?"#111213":"#7A7D85",opacity:isValid?1:0.5,transition:"all 0.2s"}}>{isEdit?"SAVE CHANGES":"ADD SUPPLEMENT"}</button>
        </div>
        {!isValid&&<p style={{textAlign:"center",color:"#7A7D85",fontSize:10,fontFamily:"'Space Mono',monospace",marginTop:10,letterSpacing:"0.5px"}}>Fill in all required (*) fields to continue</p>}
        {isEdit&&onDelete&&(
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <button onClick={()=>{if(window.confirm("Stop taking "+supp.name+"? It will move to history but your logs are kept."))onStopTaking&&onStopTaking(supp.id);}} style={{flex:1,padding:"10px",background:"transparent",border:"1px solid #3A4A5C",borderRadius:9,color:"#7A9BB5",fontFamily:"'Space Mono',monospace",fontSize:11,cursor:"pointer",letterSpacing:"0.5px"}}>STOP TAKING</button>
            <button onClick={()=>{if(window.confirm("Delete "+supp.name+"? This cannot be undone."))onDelete(supp.id);}} style={{flex:1,padding:"10px",background:"transparent",border:"1px solid rgba(192,57,43,0.3)",borderRadius:9,color:"#C0392B",fontFamily:"'Space Mono',monospace",fontSize:11,cursor:"pointer",letterSpacing:"0.5px"}}>DELETE</button>
          </div>
        )}
      </div>
    </div>
  );
}

        {perm==="denied"&&<p style={{color:"#C0392B",fontSize:12,fontFamily:"'Space Mono',monospace",lineHeight:1.6,marginBottom:16}}>Blocked. Go to Settings → Notifications → allow this site.</p>}
