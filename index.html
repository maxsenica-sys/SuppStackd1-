  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .splash-bg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; animation: bgFadeIn 1s ease 0.2s forwards; }
    @keyframes bgFadeIn { to { opacity: 1; } }
    .splash-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; }
    .splash-wordmark { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: clamp(58px, 16.5vw, 96px); letter-spacing: -1px; text-transform: uppercase; color: #FFFFFF; line-height: 1; opacity: 0; transform: translateY(30px); animation: wordmarkIn 0.8s cubic-bezier(0.16,1,0.3,1) 0.5s forwards; text-shadow: 0 0 80px rgba(232,168,48,0.15); padding: 0 32px; text-align: center; width: 100%; }
    .splash-wordmark span { color: #E8A830; }
    @keyframes wordmarkIn { to { opacity: 1; transform: translateY(0); } }
    .splash-tagline { font-family: 'Space Mono', monospace; font-size: clamp(13px, 3.5vw, 18px); letter-spacing: 3px; color: #7A7D85; text-transform: uppercase; margin-top: 14px; opacity: 0; animation: taglineIn 0.6s ease 1.1s forwards; text-align: center; padding: 0 28px; }

    /* ── MAIN APP ────────────────────────────────────────────────────── */

    /* ── FEEDBACK ────────────────────────────────────────────────────── */

    .star-btn { background: transparent; border: none; cursor: pointer; font-size: 28px; padding: 4px 6px; transition: transform 0.15s; line-height: 1; }
    .star-btn:active { transform: scale(1.2); }

    /* ── PROFILE ONBOARDING ──────────────────────────────────────────── */
    .onboard-screen { position: fixed; inset: 0; background: #0A0A0A; z-index: 200; display: flex; flex-direction: column; overflow-y: auto; }
    .onboard-progress { height: 3px; background: #1C1D1F; }

    .sport-btn { padding: 10px 14px; border-radius: 20px; cursor: pointer; font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.5px; transition: all 0.15s; border: 1px solid #2A2B2E; background: transparent; color: #7A7D85; }
    .sport-btn.selected { border-color: #E8A830; background: rgba(232,168,48,0.1); color: #E8A830; }
    .goal-btn { padding: 12px 16px; border-radius: 12px; cursor: pointer; font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.5px; transition: all 0.15s; border: 1px solid #2A2B2E; background: transparent; color: #7A7D85; text-align: left; width: 100%; margin-bottom: 8px; }
    .goal-btn.selected { border-color: #E8A830; background: rgba(232,168,48,0.08); color: #E8A830; }

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const STORAGE_KEY   = "suppstackd_v1_supplements";
const LOG_KEY       = "suppstackd_v1_logs";
const FEEDBACK_KEY  = "suppstackd_v1_feedback";
const ACTIVE_KEY    = "suppstackd_v1_active_days";
const FB_SHOWN_KEY  = "suppstackd_v1_feedback_shown";
const PROFILE_KEY   = "suppstackd_v1_profile";
const FEEL_KEY      = "suppstackd_v1_feel";

const SUPPLEMENT_TYPES = ["Powder","Capsule","Tablet","Liquid","Gummy","Other"];
const UNITS = ["g","kg","mg","ml","lb","oz","fl oz","count"];
// ── Pro mode flag ────────────────────────────────────────────────────────────
// DEV_PRO_MODE: set true on dev branch to preview Pro UI, always false on main
const DEV_PRO_MODE = false;

const CURRENCIES = {
  "GB":"£","US":"$","EU":"€","AU":"A$","CA":"C$","NZ":"NZ$","IN":"₹","JP":"¥",
  "CH":"CHF","SE":"kr","NO":"kr","DK":"kr","PL":"zł","BR":"R$","MX":"$","ZA":"R",
  "AE":"AED","SG":"S$","HK":"HK$","TR":"₺","KR":"₩","CN":"¥","Other":"$"
};
const COUNTRIES = [
  "GB — United Kingdom","US — United States","EU — European Union","AU — Australia",
  "CA — Canada","NZ — New Zealand","IN — India","JP — Japan","CH — Switzerland",
  "SE — Sweden","NO — Norway","DK — Denmark","PL — Poland","BR — Brazil",
  "MX — Mexico","ZA — South Africa","AE — UAE","SG — Singapore","HK — Hong Kong",
  "TR — Turkey","KR — South Korea","CN — China","Other"
];
const SPORTS = ["Gym / Weightlifting","Running","Cycling","CrossFit","Swimming","Football","Rugby","Basketball","MMA / Boxing","Tennis","Triathlon","Yoga / Pilates","Other"];
const GOALS  = ["Build muscle & strength","Lose weight / body fat","Boost energy & performance","Improve focus & recovery","General health & wellness","Competitive sport performance"];
const EXPERIENCE = ["Just starting out","6–12 months","1–3 years","3+ years","Elite / Professional"];

// ── Persistent Storage (IndexedDB + localStorage fallback) ───────────────────
const DB_NAME = "suppstackd_db";
const DB_VERSION = 1;
const STORE_NAME = "kv";

let _db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    if (_db) return resolve(_db);
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore(STORE_NAME, { keyPath: "key" });
    };
    req.onsuccess = e => { _db = e.target.result; resolve(_db); };
    req.onerror = () => reject(req.error);
  });
}

function saveAsync(key, val) {
  // Always write to localStorage immediately (fast, synchronous)
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  // Also write to IndexedDB (persistent, survives Safari purge)
  openDB().then(db => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).put({ key, value: JSON.stringify(val) });
  }).catch(() => {});
}

function loadAsync(key, fb) {
  return openDB().then(db => {
    return new Promise((resolve) => {
      const req = db.transaction(STORE_NAME, "readonly").objectStore(STORE_NAME).get(key);
      req.onsuccess = () => {
        if (req.result) {
          try {
            const parsed = JSON.parse(req.result.value);
            // Also refresh localStorage cache
            try { localStorage.setItem(key, req.result.value); } catch {}
            resolve(parsed || fb);
          } catch { resolve(fb); }
        } else {
          // Fall back to localStorage if not in IndexedDB yet
          try {
            const ls = JSON.parse(localStorage.getItem(key));
            if (ls !== null && ls !== undefined) {
              // Migrate to IndexedDB
              saveAsync(key, ls);
              resolve(ls);
            } else { resolve(fb); }
          } catch { resolve(fb); }
        }
      };
      req.onerror = () => {
        try { resolve(JSON.parse(localStorage.getItem(key)) || fb); } catch { resolve(fb); }
      };
    });
  }).catch(() => {
    try { return JSON.parse(localStorage.getItem(key)) || fb; } catch { return fb; }
  });
}

// Synchronous load — reads from localStorage cache (IndexedDB loads happen on app init)
function load(key, fb) { try { return JSON.parse(localStorage.getItem(key)) || fb; } catch { return fb; } }
function save(key, val) { saveAsync(key, val); }
function today() { return new Date().toDateString(); }
function todayISO() { return new Date().toISOString().slice(0,10); }
function formatDate(d) { return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); }
function daysFromNow(d) { const now=new Date();now.setHours(0,0,0,0);const t=new Date(d);t.setHours(0,0,0,0);return Math.round((t-now)/86400000); }
function calcRunOut(s) { const rem=s.totalAmount-s.consumed;if(rem<=0)return new Date();const d=new Date();d.setDate(d.getDate()+Math.ceil(rem/(s.servingSize*s.servingsPerDay)));return d; }
function urgencyColor(days) { if(days<=7)return"#C0392B";if(days<=21)return"#E8A830";return"#5BAD72"; }
function urgencyLabel(days) { if(days<=0)return"DEPLETED";if(days<=7)return"CRITICAL";if(days<=21)return"LOW";return"STOCKED"; }

function checkAndTrackActiveDay() {
  const todayStr = today();
  const alreadyShown = load(FB_SHOWN_KEY, false);
  if (alreadyShown) return false;
  let activeDays = load(ACTIVE_KEY, []);
  if (!activeDays.includes(todayStr)) {
    activeDays = [...activeDays, todayStr].slice(-10);
    save(ACTIVE_KEY, activeDays);
  }
  if (activeDays.length < 3) return false;
  const last3 = activeDays.slice(-3);
  const d2=new Date(last3[2]),d1=new Date(last3[1]),d0=new Date(last3[0]);
  d2.setHours(0,0,0,0);d1.setHours(0,0,0,0);d0.setHours(0,0,0,0);
  return Math.round((d2-d1)/86400000)===1 && Math.round((d1-d0)/86400000)===1;
}

async function requestNotifPerm() { if(!("Notification"in window))return false;if(Notification.permission==="granted")return true;return(await Notification.requestPermission())==="granted"; }
function fireNotif(title,body,delay=500) { if(!("Notification"in window)||Notification.permission!=="granted")return;setTimeout(()=>{try{const n=new Notification(title,{body,tag:"suppstackd"});setTimeout(()=>n.close(),6000);}catch{}},delay); }
let installPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();installPrompt=e;});

// ── CalendarBar ───────────────────────────────────────────────────────────────
function CalendarBar({ logs, supplements, onDateSelect, selectedDate }) {
  const DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const now = new Date(); now.setHours(0,0,0,0);
  const todayStr = now.toISOString().slice(0,10);

  // Generate 60 days: 30 past + today + 29 future
  const days = [];
  for (let i = -30; i <= 29; i++) {
    const d = new Date(now);
    d.setDate(now.getDate() + i);
    days.push(d);
  }

  const suppCount = supplements.length;

  // Build per-date log counts
  const dateCounts = {};
  logs.forEach(l => {
    try {
      const iso = new Date(l.ts).toISOString().slice(0,10);
      dateCounts[iso] = (dateCounts[iso] || new Set());
      dateCounts[iso].add(l.suppId);
    } catch {}
  });

  // 3 states per date:
  // "full"    = all supplements logged → green
  // "partial" = some logged → amber
  // "none"    = nothing logged (past) → faded grey
  const getDateState = (iso) => {
    const logged = dateCounts[iso];
    if (!logged || logged.size === 0) return "none";
    if (suppCount > 0 && logged.size >= suppCount) return "full";
    return "partial";
  };

  const todayRef = useRef(null);
  useEffect(() => {
    if (todayRef.current) todayRef.current.scrollIntoView({ inline: "center", behavior: "instant" });
  }, []);

  return (
    <div className="cal-bar">
      {days.map((d, i) => {
        const iso = d.toISOString().slice(0,10);
        const isToday = iso === todayStr;
        const isFuture = d > now;
        const isPast = d < now;
        const dateState = getDateState(iso);
        const isSelected = selectedDate === iso;
        const dotColor = isToday ? "#111213" : dateState === "full" ? "#5BAD72" : "#E8A830";
        const bgColor = isSelected && !isToday ? "rgba(232,168,48,0.18)" :
                        isToday ? "linear-gradient(135deg,#E8A830,#C88820)" :
                        dateState === "full" ? "rgba(91,173,114,0.12)" :
                        dateState === "partial" ? "rgba(232,168,48,0.08)" : "transparent";
        const borderColor = isSelected && !isToday ? "1px solid rgba(232,168,48,0.6)" :
                            dateState === "full" && !isToday ? "1px solid rgba(91,173,114,0.25)" :
                            dateState === "partial" && !isToday ? "1px solid rgba(232,168,48,0.2)" :
                            "1px solid transparent";
        return (
          <div
            key={i}
            ref={isToday ? todayRef : null}
            onClick={() => onDateSelect(iso)}
            style={{
              display:"flex",flexDirection:"column",alignItems:"center",gap:4,
              minWidth:40,padding:"8px 4px",borderRadius:10,cursor:"pointer",
              flexShrink:0,transition:"all 0.15s",
              background: bgColor, border: borderColor,
              opacity: isPast && dateState === "none" && !isSelected ? 0.4 : 1,
            }}
          >
            <span style={{fontFamily:"'Space Mono',monospace",fontSize:9,letterSpacing:"0.5px",textTransform:"uppercase",color:isToday?"#111213":isSelected?"#E8A830":"#7A7D85"}}>
              {DAY_NAMES[d.getDay()]}
            </span>
            <span style={{fontFamily:"'Barlow Condensed',monospace",fontWeight:700,fontSize:16,lineHeight:1,color:isToday?"#111213":isSelected?"#E8A830":"#F0F0F0"}}>
              {d.getDate()}
            </span>
            {(dateState !== "none" || isToday) && (
              <div style={{width:4,height:4,borderRadius:"50%",background:dotColor}}/>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── DateLogModal — view/edit/add logs for a specific date ────────────────────
function DateLogModal({ date, supplements, logs, onClose, onSaveLog, onEditLog, onDeleteLog }) {
  const dateObj = new Date(date + "T00:00:00");
  const dateLabel = dateObj.toLocaleDateString("en-GB", { weekday:"long", day:"numeric", month:"long", year:"numeric" });
  const isToday = date === new Date().toISOString().slice(0,10);
  const isFuture = dateObj > new Date(new Date().toISOString().slice(0,10) + "T00:00:00");

  // Logs for this date
  const dateLogs = logs.filter(l => {
    try { return new Date(l.ts).toISOString().slice(0,10) === date; } catch { return false; }
  });

  // Which supplements were logged on this date
  const loggedSuppIds = new Set(dateLogs.map(l => l.suppId));

  const [addingFor, setAddingFor] = useState(null); // supp being quick-logged
  const [quickAmt, setQuickAmt] = useState("");
  const [quickNotes, setQuickNotes] = useState("");

  const handleQuickLog = (supp) => {
    setAddingFor(supp);
    setQuickAmt(String(supp.servingSize));
    setQuickNotes("");
  };

  const confirmQuickLog = () => {
    if (!addingFor) return;
    onSaveLog({
      suppId: addingFor.id,
      date: addingFor.lastLogged,
      taken: true,
      amount: parseFloat(quickAmt) || addingFor.servingSize,
      notes: quickNotes,
      feel: {},
      ts: new Date(date + "T12:00:00").getTime(),
      backdated: true,
    });
    setAddingFor(null);
  };

  return (
    <div className="overlay" onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
      <div className="modal-box" style={{padding:"18px 20px",maxHeight:"85vh",overflowY:"auto"}}>
        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>

            <p style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:9,letterSpacing:"1.5px",margin:"0 0 4px"}}>{isFuture?"UPCOMING":isToday?"TODAY":"PAST DATE"}</p>
            <h2 style={{fontSize:17,fontWeight:700,color:"#F0F0F0",margin:0,lineHeight:1.3}}>{dateLabel}</h2>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:20,fontWeight:700,color:"#E8A830",lineHeight:1,padding:"2px 4px"}}>✕</button>
        </div>

        {/* Future date message */}
        {isFuture && (
          <div style={{background:"rgba(232,168,48,0.07)",border:"1px solid rgba(232,168,48,0.2)",borderRadius:10,padding:"12px 14px",marginBottom:16}}>
            <p style={{color:"#E8A830",fontFamily:"'Space Mono',monospace",fontSize:11,margin:0,lineHeight:1.6}}>This date is in the future. You can pre-log supplements here if you want to plan ahead.</p>
          </div>
        )}

        {/* Logged entries for this date */}
        {dateLogs.length > 0 && (
          <div style={{marginBottom:16}}>
            <span style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:10,letterSpacing:"1.5px",display:"block",marginBottom:8}}>LOGGED</span>
            {dateLogs.map((log, i) => {
              const supp = supplements.find(s => s.id === log.suppId);
              return (
                <div key={i} style={{background:"#111213",border:"1px solid #2A2B2E",borderRadius:9,padding:"10px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <p style={{margin:0,color:"#F0F0F0",fontWeight:700,fontSize:13}}>{supp?.name||"Unknown"}</p>
                    <p style={{margin:"2px 0 0",color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:10}}>{log.taken?`${log.amount}${supp?.unit||""} taken`:"Skipped"}{log.notes?` · ${log.notes}`:""}</p>
                  </div>
                  <button onClick={() => onDeleteLog(log)} style={{background:"transparent",border:"1px solid #2A2B2E",borderRadius:7,padding:"4px 10px",color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:10,cursor:"pointer"}}>REMOVE</button>
                </div>
              );
            })}
          </div>
        )}

        {/* Unlogged supplements — add missing entries */}
        {supplements.filter(s => !loggedSuppIds.has(s.id)).length > 0 && (
          <div>
            <span style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:10,letterSpacing:"1.5px",display:"block",marginBottom:8}}>{dateLogs.length > 0 ? "NOT LOGGED" : "SUPPLEMENTS"}</span>
            {supplements.filter(s => !loggedSuppIds.has(s.id)).map((supp, i) => (
              <div key={i}>
                {addingFor?.id === supp.id ? (
                  <div style={{background:"rgba(232,168,48,0.06)",border:"1px solid rgba(232,168,48,0.3)",borderRadius:9,padding:"12px 14px",marginBottom:8}}>
                    <p style={{margin:"0 0 10px",color:"#E8A830",fontWeight:700,fontSize:13,fontFamily:"'Space Mono',monospace"}}>{supp.name}</p>
                    <div style={{display:"flex",gap:8,marginBottom:8}}>
                      <div style={{flex:1}}>
                        <span style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:10,letterSpacing:"1px",display:"block",marginBottom:4}}>AMOUNT ({supp.unit})</span>
                        <input type="number" className="inp" value={quickAmt} onChange={e=>setQuickAmt(e.target.value)} style={{fontSize:13}}/>
                      </div>
                    </div>
                    <input className="inp" placeholder="Notes (optional)" value={quickNotes} onChange={e=>setQuickNotes(e.target.value)} style={{marginBottom:10}}/>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={()=>setAddingFor(null)} className="btn-cancel" style={{flex:1,padding:"8px 0",fontSize:11}}>Cancel</button>

                    </div>
                  </div>
                ) : (
                  <div style={{background:"#111213",border:"1px solid #2A2B2E",borderRadius:9,padding:"10px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <p style={{margin:0,color:"#7A7D85",fontWeight:700,fontSize:13}}>{supp.name}</p>
                      <p style={{margin:"2px 0 0",color:"#4A4B4F",fontFamily:"'Space Mono',monospace",fontSize:10}}>{supp.servingSize}{supp.unit}/serving</p>
                    </div>
                    <button onClick={()=>handleQuickLog(supp)} style={{background:"rgba(232,168,48,0.08)",border:"1px solid rgba(232,168,48,0.3)",borderRadius:7,padding:"6px 12px",color:"#E8A830",fontFamily:"'Space Mono',monospace",fontSize:10,fontWeight:700,cursor:"pointer",letterSpacing:"0.5px"}}>+ LOG</button>
                  </div>
                )}

            ))}

        )}

        {supplements.length === 0 && (
          <p style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:12,textAlign:"center",padding:"24px 0"}}>No supplements added yet.</p>

        <button onClick={onClose} style={{width:"100%",marginTop:8,padding:"10px",background:"transparent",border:"1px solid #2A2B2E",borderRadius:9,color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:12,cursor:"pointer"}}>CLOSE</button>
      </div>
    </div>
  );
}

// ── ProgressRing ──────────────────────────────────────────────────────────────
function ProgressRing({pct,color,size=58}) {
  const r=(size-6)/2,circ=2*Math.PI*r,offset=circ-(Math.min(pct,100)/100)*circ;
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#2A2B2E" strokeWidth="5"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="5" strokeDasharray={circ} strokeDashoffset={offset} style={{transition:"stroke-dashoffset 0.7s ease",strokeLinecap:"round"}}/>
    </svg>
  );
}


// ── StackCardList — measures available height, shows 3+ cards, scrolls if more ──
function StackCardList({displaySupps, onLog, onEdit, onDelete}) {
  const containerRef = useRef(null);
  const [maxH, setMaxH] = useState(320);

  useEffect(() => {
    function measure() {
      if (!containerRef.current) return;
      const rect = containerRef.current.getBoundingClientRect();
      // Available = distance from this container top to bottom of viewport minus bottom nav (~62px)
      const available = window.innerHeight - rect.top - 70;
      // Enforce minimum of 3 cards (~115px each = 345px) and use available space
      setMaxH(Math.max(345, available));
    }
    measure();
    window.addEventListener("resize", measure);
    return () => window.removeEventListener("resize", measure);
  }, []);

  return (
    <div ref={containerRef} style={{
      overflowY: "auto",
      maxHeight: maxH,
      WebkitOverflowScrolling: "touch",
      paddingBottom: displaySupps.length > 3 ? 16 : 0,
    }}>
      {displaySupps.map(s=>(
        <SupplementCard key={s.id} supp={s} onLog={onLog} onEdit={onEdit} onDelete={onDelete}/>
      ))}
    </div>
  );
}

// ── SupplementCard ────────────────────────────────────────────────────────────
function SupplementCard({supp,onLog,onEdit,onDelete}) {
  const runOut=calcRunOut(supp),days=daysFromNow(runOut);
  const remaining=Math.max(0,supp.totalAmount-(supp.consumed||0));
  const totalDays=supp.totalAmount>0?Math.floor(supp.totalAmount/(supp.servingSize*supp.servingsPerDay)):0;
  const daysRemaining=Math.max(0,daysFromNow(calcRunOut(supp)));
  const pct=totalDays>0?Math.max(0,Math.min(100,(daysRemaining/totalDays)*100)):0;
  const color=urgencyColor(days);
  const logged=supp.lastLogged===today();
  return (
    <div className="card" style={{borderLeft:`3px solid ${color}`,padding:"10px 12px",marginBottom:5}}>
      {/* Single row layout: name+subtitle | ring + actions */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:2}}>
            <h3 style={{fontSize:15,fontWeight:700,color:"#F0F0F0",lineHeight:1.2,margin:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{supp.name}</h3>
            <span style={{fontSize:10,color:color,fontFamily:"'Space Mono',monospace",whiteSpace:"nowrap",flexShrink:0}}>{urgencyLabel(days)} · {days>0?`${days}d`:"NOW"}</span>
          </div>
          <span style={{fontSize:10,color:"#7A7D85",fontFamily:"'Space Mono',monospace"}}>{supp.brand?`${supp.brand} · `:""}{remaining%1===0?remaining.toFixed(0):remaining.toFixed(1)}{supp.unit} left · out {formatDate(runOut)}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
          <div style={{position:"relative"}}>
            <ProgressRing pct={pct} color={color} size={40}/>
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <span style={{fontSize:9,fontWeight:800,color,fontFamily:"'Space Mono',monospace"}}>{Math.round(pct)}%</span>
            </div>
          </div>
          <button onClick={()=>onLog(supp)} style={{padding:"5px 10px",border:logged?"1px solid #2A2B2E":"1px solid rgba(232,168,48,0.4)",background:logged?"#111213":"rgba(232,168,48,0.07)",color:logged?"#7A7D85":"#E8A830",borderRadius:6,cursor:"pointer",fontFamily:"'Space Mono',monospace",fontSize:10,fontWeight:700,whiteSpace:"nowrap"}}>
            {logged?"✓ LOGGED":"LOG"}
          </button>
          <button style={{padding:"5px 10px",border:"1px solid #2A2B2E",background:"transparent",color:"#7A7D85",borderRadius:6,cursor:"pointer",fontFamily:"'Space Mono',monospace",fontSize:10,fontWeight:700}} onClick={()=>onEdit(supp)}>EDIT</button>
        </div>
      </div>
      {/* Progress bar */}
      <div style={{height:2,background:"#2A2B2E",borderRadius:2}}>
        <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:2,transition:"width 0.6s ease"}}/>
      </div>
    </div>
  );
}

                      <span style={{color:"#E8A830",fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:700}}>{feel[metric.key]||"—"}</span>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      {[1,2,3,4,5].map(n=>(
                        <button key={n} onClick={()=>setFeel(f=>({...f,[metric.key]:n}))} style={{flex:1,padding:"6px 0",borderRadius:7,cursor:"pointer",fontFamily:"'Space Mono',monospace",fontSize:12,fontWeight:700,border:feel[metric.key]===n?"1px solid #E8A830":"1px solid #2A2B2E",background:feel[metric.key]===n?"rgba(232,168,48,0.12)":"#111213",color:feel[metric.key]===n?"#E8A830":"#7A7D85",transition:"all 0.12s"}}>{n}</button>
                      ))}
                    </div>
                  </div>
                ))}
                <button onClick={()=>{setFeel(todayFeel);setFeelChanged(false);}} style={{background:"transparent",border:"none",color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:10,cursor:"pointer",padding:"4px 0",marginBottom:4}}>← back to same</button>
              </div>
            )}
          </div>
        )}
        <input placeholder="Notes (optional)" value={notes} onChange={e=>setNotes(e.target.value)} className="inp" style={{marginBottom:10}}/>
        <div className="flex gap-10">
          <button className="btn-cancel flex-1" onClick={onClose}>Cancel</button>
          <button className="btn-primary" style={{flex:2}} onClick={()=>onSave({taken,amount,notes,feel})}>SAVE LOG</button>
        </div>
      </div>
    </div>
  );
}

// ── AddEditModal ──────────────────────────────────────────────────────────────
function AddEditModal({supp,onClose,onSave,onDelete,profile}) {
  const isEdit=!!supp;
  const [form,setForm]=useState(supp?{...supp,totalAmount:String(supp.totalAmount),servingSize:String(supp.servingSize),servingsPerDay:String(supp.servingsPerDay),consumed:String(supp.consumed)}:{name:"",brand:"",type:"Powder",totalAmount:"",unit:"g",servingSize:"",servingsPerDay:"",consumed:"0",lastLogged:null});
  const [touched,setTouched]=useState({});
  const [submitted,setSubmitted]=useState(false);
  const [alreadyStarted,setAlreadyStarted]=useState(false);
  const [startedMode,setStartedMode]=useState("amount");
  const [amountLeft,setAmountLeft]=useState("");
  const [daysAlready,setDaysAlready]=useState("");
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const touch=(k)=>setTouched(t=>({...t,[k]:true}));
  const calcConsumed=()=>{
    const total=parseFloat(form.totalAmount)||0,serving=parseFloat(form.servingSize)||0,perDay=parseFloat(form.servingsPerDay)||1;
    if(startedMode==="amount"){const left=parseFloat(amountLeft)||0;return Math.max(0,total-left);}
    else{const days=parseInt(daysAlready)||0;return Math.min(total,days*serving*perDay);}
  };
  const effectiveConsumed=!isEdit&&alreadyStarted?calcConsumed():parseFloat(form.consumed)||0;
  const errors={
    name:!form.name.trim()?"Supplement name is required":null,
    totalAmount:!form.totalAmount?"Total amount is required":parseFloat(form.totalAmount)<=0?"Must be greater than 0":null,
    servingSize:!form.servingSize?"Serving size is required":parseFloat(form.servingSize)<=0?"Must be greater than 0":parseFloat(form.servingSize)>parseFloat(form.totalAmount||999999)?"Can't exceed total amount":null,
    servingsPerDay:!form.servingsPerDay?"Servings per day is required":parseFloat(form.servingsPerDay)<=0?"Must be > 0":null,
    consumed:isEdit&&form.consumed!==""&&parseFloat(form.consumed)>parseFloat(form.totalAmount||0)?"Can't exceed total amount":null,
  };
  const reqFields=["name","totalAmount","servingSize","servingsPerDay"];
  const isValid=reqFields.every(k=>!errors[k]);
  const completed=reqFields.filter(k=>!errors[k]).length;
  const progPct=Math.round((completed/reqFields.length)*100);
  const showErr=k=>(touched[k]||submitted)&&errors[k];
  const totalNum=parseFloat(form.totalAmount)||0;
  const remaining=totalNum-effectiveConsumed;
  const preview=form.totalAmount&&form.servingSize&&!errors.totalAmount&&!errors.servingSize&&remaining>0
    ?Math.ceil(remaining/((parseFloat(form.servingSize)||1)*(parseFloat(form.servingsPerDay)||1))):null;
  const handleSave=()=>{setSubmitted(true);if(!isValid)return;onSave({...form,id:form.id||Date.now().toString(),totalAmount:parseFloat(form.totalAmount),servingSize:parseFloat(form.servingSize),servingsPerDay:parseFloat(form.servingsPerDay)||1,consumed:effectiveConsumed,price:parseFloat(form.price)||null});};
  const ic=k=>`inp${showErr(k)?" error":touched[k]&&!errors[k]?" valid":""}`;
  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-box" style={{padding:"18px 20px"}}>
        <div style={{marginBottom:14}}>
          <div className="flex" style={{justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <h2 style={{fontSize:19,fontWeight:700,color:"#F0F0F0",margin:0}}>{isEdit?"Edit Supplement":"Add Supplement"}</h2>
            <button onClick={onClose} style={{background:"transparent",border:"none",cursor:"pointer",padding:"2px 6px",fontSize:20,fontWeight:700,color:"#E8A830",lineHeight:1}}>✕</button>
          </div>
          {!isEdit&&<div>
            <div className="flex" style={{justifyContent:"space-between",marginBottom:4}}>
              <span style={{color:"#7A7D85",fontSize:10,fontFamily:"'Space Mono',monospace",letterSpacing:1}}>REQUIRED FIELDS</span>
              <span style={{color:isValid?"#5BAD72":"#7A7D85",fontSize:10,fontFamily:"'Space Mono',monospace"}}>{completed}/{reqFields.length}</span>
            </div>
            <div style={{height:2,background:"#2A2B2E",borderRadius:2}}><div style={{height:"100%",borderRadius:2,transition:"width 0.3s ease,background 0.3s",width:`${progPct}%`,background:isValid?"#5BAD72":"#E8A830"}}/></div>
          </div>}
        </div>
        <div className="field"><span className="section-label">SUPPLEMENT NAME *</span><input className={ic("name")} placeholder="e.g. Whey Protein, Creatine, Vitamins" value={form.name} onChange={e=>set("name",e.target.value)} onBlur={()=>touch("name")}/>{showErr("name")&&<div className="err-msg">⚠ {errors.name}</div>}</div>
        <div className="field"><span className="section-label">BRAND (OPTIONAL)</span><input className="inp" placeholder="e.g. Optimum Nutrition, MyProtein" value={form.brand} onChange={e=>set("brand",e.target.value)}/></div>
        <div className="flex gap-10">
          <div className="field flex-1"><span className="section-label">TYPE</span><select className="inp" value={form.type} onChange={e=>set("type",e.target.value)}>{SUPPLEMENT_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
          <div className="field flex-1"><span className="section-label">UNIT</span><select className="inp" value={form.unit} onChange={e=>set("unit",e.target.value)}>{UNITS.map(u=><option key={u}>{u}</option>)}</select></div>
        </div>
        <div className="field"><span className="section-label">TOTAL AMOUNT IN CONTAINER ({form.unit}) *</span><input type="number" className={ic("totalAmount")} placeholder="e.g. 1000" min="0" value={form.totalAmount} onChange={e=>set("totalAmount",e.target.value)} onBlur={()=>touch("totalAmount")}/>{showErr("totalAmount")&&<div className="err-msg">⚠ {errors.totalAmount}</div>}</div>
        <div className="flex gap-10">
          <div className="field flex-1"><span className="section-label">SERVING SIZE ({form.unit}) *</span><input type="number" className={ic("servingSize")} placeholder="e.g. 25" min="0" value={form.servingSize} onChange={e=>set("servingSize",e.target.value)} onBlur={()=>touch("servingSize")}/>{showErr("servingSize")&&<div className="err-msg">⚠ {errors.servingSize}</div>}</div>
          <div className="field flex-1"><span className="section-label">SERVINGS / DAY *</span><input type="number" className={ic("servingsPerDay")} placeholder="e.g. 1" min="0.5" step="0.5" value={form.servingsPerDay} onChange={e=>set("servingsPerDay",e.target.value)} onBlur={()=>touch("servingsPerDay")}/>{showErr("servingsPerDay")&&<div className="err-msg">⚠ {errors.servingsPerDay}</div>}</div>
        </div>
        <div className="field"><span className="section-label">PRICE PAID (OPTIONAL)</span><div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:13}}>{CURRENCIES[profile?.country||"Other"]||"£"}</span><input type="number" className="inp" placeholder="e.g. 29.99" min="0" step="0.01" value={form.price||""} onChange={e=>set("price",e.target.value)}/></div><p style={{color:"#7A7D85",fontSize:10,fontFamily:"'Space Mono',monospace",marginTop:6}}>Used to calculate your daily stack cost.</p></div>
        {!isEdit&&(
          <div style={{marginBottom:16}}>
            <button onClick={()=>setAlreadyStarted(v=>!v)} style={{width:"100%",padding:"11px 14px",background:alreadyStarted?"rgba(232,168,48,0.08)":"#111213",border:alreadyStarted?"1px solid rgba(232,168,48,0.4)":"1px solid #2A2B2E",borderRadius:9,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",transition:"all 0.2s"}}>
              <span style={{color:alreadyStarted?"#E8A830":"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:11,letterSpacing:"0.5px"}}>🫙 ALREADY STARTED THIS TUB?</span>
              <span style={{color:alreadyStarted?"#E8A830":"#7A7D85",fontSize:16}}>{alreadyStarted?"▲":"▼"}</span>
            </button>
            {alreadyStarted&&(
              <div style={{background:"#111213",border:"1px solid #2A2B2E",borderRadius:"0 0 9px 9px",padding:"14px 14px 10px",marginTop:-1}}>
                <p style={{color:"#7A7D85",fontSize:11,fontFamily:"'Space Mono',monospace",marginBottom:12,lineHeight:1.6}}>Tell us how much you've used so the run-out date is accurate.</p>
                <div className="flex gap-8" style={{marginBottom:14}}>
                  {[{v:"amount",label:"I know what's left"},{v:"days",label:"I know days taken"}].map(opt=>(
                    <button key={opt.v} onClick={()=>setStartedMode(opt.v)} style={{flex:1,padding:"7px 4px",borderRadius:8,cursor:"pointer",fontFamily:"'Space Mono',monospace",fontSize:10,letterSpacing:"0.3px",border:startedMode===opt.v?"1px solid #E8A830":"1px solid #2A2B2E",background:startedMode===opt.v?"rgba(232,168,48,0.1)":"transparent",color:startedMode===opt.v?"#E8A830":"#7A7D85",transition:"all 0.15s"}}>{opt.label}</button>
                  ))}
                </div>
                {startedMode==="amount"?(
                  <div>
                    <span className="section-label">AMOUNT REMAINING IN TUB ({form.unit||"unit"})</span>
                    <input type="number" className="inp" placeholder={`e.g. ${Math.round(totalNum*0.5)||250}`} min="0" value={amountLeft} onChange={e=>setAmountLeft(e.target.value)}/>
                    {amountLeft&&totalNum>0&&<p style={{color:"#7A7D85",fontSize:11,fontFamily:"'Space Mono',monospace",marginTop:6}}>≈ {Math.round(calcConsumed())} {form.unit} already used</p>}
                  </div>
                ):(
                  <div>
                    <span className="section-label">HOW MANY DAYS HAVE YOU BEEN TAKING IT?</span>
                    <input type="number" className="inp" placeholder="e.g. 14" min="0" value={daysAlready} onChange={e=>setDaysAlready(e.target.value)}/>
                    {daysAlready&&<p style={{color:"#7A7D85",fontSize:11,fontFamily:"'Space Mono',monospace",marginTop:6}}>≈ {Math.round(calcConsumed())} {form.unit} used · {Math.max(0,Math.round(totalNum-calcConsumed()))} {form.unit} left</p>}
                  </div>
                )}
              </div>
            )}
          </div>
        )}
        {isEdit&&<div className="field"><span className="section-label">ALREADY CONSUMED ({form.unit})</span><input type="number" className={ic("consumed")} min="0" value={form.consumed} onChange={e=>set("consumed",e.target.value)} onBlur={()=>touch("consumed")}/>{showErr("consumed")&&<div className="err-msg">⚠ {errors.consumed}</div>}</div>}
        {preview!==null&&preview>0&&(
          <div style={{background:"#111213",border:"1px solid rgba(232,168,48,0.2)",borderRadius:10,padding:"12px 16px",marginBottom:18,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <span style={{color:"#7A7D85",fontSize:11,fontFamily:"'Space Mono',monospace",display:"block"}}>ESTIMATED SUPPLY</span>
              {alreadyStarted&&remaining>0&&<span style={{color:"#7A7D85",fontSize:10,fontFamily:"'Space Mono',monospace"}}>{Math.round(remaining)} {form.unit} remaining</span>}
            </div>
            <span style={{color:"#E8A830",fontWeight:800,fontFamily:"'Space Mono',monospace",fontSize:18}}>{preview} days</span>
          </div>
        )}
        {submitted&&!isValid&&<div style={{background:"rgba(192,57,43,0.1)",border:"1px solid rgba(192,57,43,0.3)",borderRadius:10,padding:"11px 14px",marginBottom:16}}><p style={{color:"#C0392B",fontSize:12,fontFamily:"'Space Mono',monospace",margin:0}}>Please fix the highlighted fields above before saving.</p></div>}
        <div className="flex gap-10">
          <button className="btn-cancel flex-1" onClick={onClose}>Cancel</button>
          <button onClick={handleSave} style={{flex:2,padding:12,borderRadius:10,cursor:isValid?"pointer":"not-allowed",fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:13,letterSpacing:"0.5px",border:isValid?"none":"1px solid #2A2B2E",background:isValid?"linear-gradient(135deg,#E8A830,#C88820)":"#3A3B3E",color:isValid?"#111213":"#7A7D85",opacity:isValid?1:0.5,transition:"all 0.2s"}}>{isEdit?"SAVE CHANGES":"ADD SUPPLEMENT"}</button>
        </div>
        {!isValid&&<p style={{textAlign:"center",color:"#7A7D85",fontSize:10,fontFamily:"'Space Mono',monospace",marginTop:10,letterSpacing:"0.5px"}}>Fill in all required (*) fields to continue</p>}
        {isEdit&&onDelete&&(
          <button onClick={()=>{if(window.confirm("Remove this supplement? This cannot be undone."))onDelete(supp.id);}}
            style={{width:"100%",marginTop:12,padding:"10px",background:"transparent",border:"1px solid rgba(192,57,43,0.3)",borderRadius:9,color:"#C0392B",fontFamily:"'Space Mono',monospace",fontSize:11,cursor:"pointer",letterSpacing:"0.5px"}}>
            DELETE SUPPLEMENT
          </button>
        )}
      </div>
    </div>
  );
}

  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>

          <div style={{background:"rgba(232,168,48,0.08)",border:"1px solid rgba(232,168,48,0.27)",borderRadius:10,padding:14,marginBottom:18}}>
            <p style={{color:"#E8A830",fontSize:13,fontFamily:"'Space Mono',monospace",lineHeight:1.7,margin:0}}>📱 iPhone: Add to Home Screen first:<br/>1. Tap Share in Safari<br/>2. "Add to Home Screen"<br/>3. Open from Home Screen<br/>4. Enable notifications below</p>

        )}

            <p style={{color:"#5BAD72",fontSize:13,fontFamily:"'Space Mono',monospace",marginBottom:10}}>Install Suppstackd as an app for reliable daily alerts.</p>
            <button className="btn-primary" style={{width:"100%",padding:10}} onClick={()=>installPrompt.prompt()}>INSTALL APP</button>
          </div>
        )}
        <div style={{background:"#111213",borderRadius:10,padding:"12px 14px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{color:"#7A7D85",fontSize:12,fontFamily:"'Space Mono',monospace"}}>PERMISSION</span>
          <span style={{fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:12,color:perm==="granted"?"#5BAD72":perm==="denied"?"#C0392B":"#E8A830"}}>{perm==="granted"?"GRANTED":perm==="denied"?"BLOCKED":"NOT SET"}</span>
        </div>
        {perm!=="granted"&&<button className="btn-primary" style={{width:"100%",marginBottom:10}} onClick={request}>ENABLE NOTIFICATIONS</button>}
        {perm==="granted"&&<><p style={{color:"#7A7D85",fontSize:12,fontFamily:"'Space Mono',monospace",lineHeight:1.7,marginBottom:16}}>Notifications enabled. Suppstackd will remind you each time you open the app and haven't logged today.</p><button className="btn-primary" style={{width:"100%",marginBottom:10,background:testSent?"#5BAD72":undefined}} onClick={sendTest}>{testSent?"✓ TEST SENT":"SEND TEST NOTIFICATION"}</button></>}
        {perm==="denied"&&<p style={{color:"#C0392B",fontSize:12,fontFamily:"'Space Mono',monospace",lineHeight:1.6,marginBottom:16}}>Blocked. Go to Settings → Notifications → allow this site.</p>}
        <button className="btn-cancel" style={{width:"100%"}} onClick={onClose}>Done</button>
      </div>
    </div>
  );
}

// ── SupplementHistory ─────────────────────────────────────────────────────────
function SupplementHistory({ supplements }) {
  // Group by supplement, show full history per supp
  const [selected, setSelected] = useState(null);
  const logs = load(LOG_KEY, []);

  if (selected) {
    const supp = supplements.find(s => s.id === selected);
    const suppLogs = [...logs].filter(l => l.suppId === selected).reverse();
    const totalConsumed = suppLogs.filter(l=>l.taken).reduce((a,l)=>a+l.amount,0);
    const daysTaken = new Set(suppLogs.filter(l=>l.taken).map(l=>l.date)).size;
    return (
      <div>
        <button onClick={()=>setSelected(null)} style={{background:"transparent",border:"none",color:"#E8A830",cursor:"pointer",fontFamily:"'Space Mono',monospace",fontSize:13,padding:"0 0 20px",letterSpacing:"0.5px"}}>← BACK</button>
        <h2 style={{fontSize:22,fontWeight:700,color:"#F0F0F0",marginBottom:4}}>{supp?.name}</h2>
        <p style={{color:"#7A7D85",fontSize:11,fontFamily:"'Space Mono',monospace",marginBottom:20}}>{supp?.brand||"No brand"} · {supp?.type}</p>

        {/* Summary stats */}
        <div className="flex gap-8" style={{marginBottom:20}}>
          {[
            {label:"TOTAL USED",value:`${totalConsumed%1===0?totalConsumed.toFixed(0):totalConsumed.toFixed(1)}${supp?.unit||""}`},
            {label:"DAYS TAKEN",value:daysTaken},
            {label:"REMAINING",value:`${Math.max(0,(supp?.totalAmount||0)-(supp?.consumed||0)).toFixed(0)}${supp?.unit||""}`}
          ].map(s=>(
            <div key={s.label} style={{flex:1,background:"#1C1D1F",border:"1px solid #2A2B2E",borderRadius:10,padding:"10px 6px",textAlign:"center"}}>
              <div style={{fontSize:14,fontWeight:800,color:"#E8A830",fontFamily:"'Space Mono',monospace",marginBottom:3}}>{s.value}</div>
              <div style={{fontSize:8,color:"#7A7D85",fontFamily:"'Space Mono',monospace",letterSpacing:"0.8px"}}>{s.label}</div>
            </div>
          ))}
        </div>

        {suppLogs.length===0&&<p style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:12}}>No logs yet for this supplement.</p>}
        {suppLogs.map((log,i)=>(
          <div key={i} style={{background:"#1C1D1F",border:"1px solid #2A2B2E",borderRadius:10,padding:"12px 16px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <p style={{margin:0,color:"#F0F0F0",fontWeight:600,fontSize:14}}>{log.date}</p>
                {log.notes&&<p style={{margin:"3px 0 0",color:"#7A7D85",fontSize:11}}>"{log.notes}"</p>}
              </div>
              <div style={{textAlign:"right"}}>
                <span style={{fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:13,color:log.taken?"#5BAD72":"#C0392B"}}>{log.taken?`−${log.amount.toFixed(1)}${supp?.unit||""}`:"SKIPPED"}</span>
              </div>
            </div>
          </div>
        ))}
      </div>
    );
  }

  return (
    <div>
      <h2 style={{fontSize:22,fontWeight:700,color:"#F0F0F0",marginBottom:4}}>Supplement History</h2>
      <p style={{color:"#7A7D85",fontSize:12,fontFamily:"'Space Mono',monospace",marginBottom:20}}>Tap a supplement to see full history</p>
      {supplements.length===0&&<p style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:12}}>No supplements tracked yet.</p>}
      {supplements.map(s=>{
        const suppLogs=logs.filter(l=>l.suppId===s.id);
        const lastLog=suppLogs.length?suppLogs[suppLogs.length-1]:null;
        const totalUsed=suppLogs.filter(l=>l.taken).reduce((a,l)=>a+l.amount,0);
        const runOut=calcRunOut(s);
        const days=daysFromNow(runOut);
        return (
          <div key={s.id} onClick={()=>setSelected(s.id)} style={{background:"#1C1D1F",border:"1px solid #2A2B2E",borderRadius:12,padding:"14px 16px",marginBottom:10,cursor:"pointer",borderLeft:`3px solid ${urgencyColor(days)}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div>
                <p style={{margin:0,color:"#F0F0F0",fontWeight:700,fontSize:15}}>{s.name}</p>
                <p style={{margin:"2px 0 0",color:"#7A7D85",fontSize:11,fontFamily:"'Space Mono',monospace"}}>{s.brand||"No brand"} · {s.type}</p>
              </div>
              <span style={{color:"#7A7D85",fontSize:11,fontFamily:"'Space Mono',monospace"}}>›</span>
            </div>
            <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
              <span style={{color:"#7A7D85",fontSize:11,fontFamily:"'Space Mono',monospace"}}>📦 {s.totalAmount}{s.unit} container</span>
              <span style={{color:"#7A7D85",fontSize:11,fontFamily:"'Space Mono',monospace"}}>💊 {s.servingSize}{s.unit} × {s.servingsPerDay}×/day</span>
              {totalUsed>0&&<span style={{color:"#7A7D85",fontSize:11,fontFamily:"'Space Mono',monospace"}}>✓ {totalUsed.toFixed(0)}{s.unit} used</span>}
              <span style={{color:urgencyColor(days),fontSize:11,fontFamily:"'Space Mono',monospace"}}>⏳ {days>0?`${days}d left`:"Depleted"}</span>
              {lastLog&&<span style={{color:"#7A7D85",fontSize:11,fontFamily:"'Space Mono',monospace"}}>Last: {lastLog.date}</span>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── FeedbackModal ─────────────────────────────────────────────────────────────
function FeedbackModal({onClose,isAutoPrompt=false}) {
  const [step,setStep]=useState("form");
  const [rating,setRating]=useState(0);
  const [hovered,setHovered]=useState(0);
  const [category,setCategory]=useState("");
  const [message,setMessage]=useState("");
  const [name,setName]=useState("");
  const [submitted,setSubmitted]=useState(false);
  const categories=["Something's broken","Feature request","General feedback","Love it!"];
  const [sending,setSending]=useState(false);
  const handleSubmit=()=>{
    setSubmitted(true);
    if(!rating||!category||!message.trim())return;
    setSending(true);
    // Save locally
    const entry={id:Date.now().toString(),ts:new Date().toISOString(),rating,category,message:message.trim(),name:name.trim()||"Anonymous"};
    const existing=load(FEEDBACK_KEY,[]);
    save(FEEDBACK_KEY,[...existing,entry]);
    save(FB_SHOWN_KEY,true);
    // Send via EmailJS
    emailjs.send("service_u9c8zy4","template_85iv0yd",{
      rating: String(rating),
      category,
      message: message.trim(),
      user_name: name.trim()||"Anonymous",
      date: new Date().toLocaleString("en-GB")
    }).then(()=>{setSending(false);setStep("thanks");}).catch(()=>{setSending(false);setStep("thanks");});
  };
  const handleClose=()=>{save(FB_SHOWN_KEY,true);onClose();};
  if(step==="thanks") return (
    <div className="overlay">
      <div className="modal-box" style={{textAlign:"center",padding:"40px 26px"}}>
        <h2 style={{fontSize:22,fontWeight:700,color:"#F0F0F0",marginBottom:8,marginTop:8}}>Thanks for the feedback!</h2>
        <p style={{color:"#7A7D85",fontSize:13,fontFamily:"'Space Mono',monospace",lineHeight:1.7,marginBottom:28}}>Every response goes directly to the team and helps shape where Suppstackd goes next.</p>
        <button className="btn-primary" style={{width:"100%"}} onClick={handleClose}>CLOSE</button>
      </div>
    </div>
  );
  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)handleClose();}}>
      <div className="modal-box">
        <div style={{marginBottom:20}}>
          {isAutoPrompt&&<div style={{background:"rgba(232,168,48,0.08)",border:"1px solid rgba(232,168,48,0.27)",borderRadius:10,padding:"10px 14px",marginBottom:16}}><p style={{color:"#E8A830",fontSize:11,fontFamily:"'Space Mono',monospace",margin:0,letterSpacing:"0.5px"}}>🔥 YOU'VE BEEN STACKD FOR 3 DAYS</p></div>}
          <h2 style={{fontSize:22,fontWeight:700,color:"#F0F0F0",marginBottom:4}}>Share Feedback</h2>
          <p style={{color:"#7A7D85",fontSize:12,fontFamily:"'Space Mono',monospace",lineHeight:1.6}}>Help shape the future of Suppstackd.</p>
        </div>
        <div className="field">
          <span className="section-label">HOW ARE YOU FINDING IT? *</span>
          <div style={{display:"flex",gap:4,marginBottom:4}}>
            {[1,2,3,4,5].map(n=><button key={n} className="star-btn" onMouseEnter={()=>setHovered(n)} onMouseLeave={()=>setHovered(0)} onClick={()=>setRating(n)} style={{opacity:(hovered||rating)>=n?1:0.3}}>⭐</button>)}
          </div>
          {submitted&&!rating&&<div className="err-msg">⚠ Please give a rating</div>}
          {rating>0&&<div style={{color:"#E8A830",fontSize:11,fontFamily:"'Space Mono',monospace",marginTop:4}}>{["","Needs work","Could be better","Pretty good","Really good","Love it!"][rating]}</div>}
        </div>
        <div className="field">
          <span className="section-label">WHAT'S THIS ABOUT? *</span>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {categories.map(c=><button key={c} onClick={()=>setCategory(c)} style={{padding:"6px 12px",borderRadius:20,cursor:"pointer",fontFamily:"'Space Mono',monospace",fontSize:10,letterSpacing:"0.5px",border:category===c?"1px solid #E8A830":"1px solid #2A2B2E",background:category===c?"rgba(232,168,48,0.1)":"transparent",color:category===c?"#E8A830":"#7A7D85",transition:"all 0.15s"}}>{c}</button>)}
          </div>
          {submitted&&!category&&<div className="err-msg" style={{marginTop:6}}>⚠ Please select a type</div>}
        </div>
        <div className="field">
          <span className="section-label">YOUR FEEDBACK *</span>
          <textarea className="inp" rows={4} placeholder="Tell us what's working, what's broken, or what you'd love to see next..." value={message} onChange={e=>setMessage(e.target.value)}/>
          {submitted&&!message.trim()&&<div className="err-msg">⚠ Please add a message</div>}
        </div>
        <div className="field">
          <span className="section-label">YOUR NAME (OPTIONAL)</span>
          <input className="inp" placeholder="So we know who to thank" value={name} onChange={e=>setName(e.target.value)}/>
        </div>
        <div className="flex gap-10">
          <button className="btn-cancel flex-1" onClick={handleClose}>{isAutoPrompt?"Maybe later":"Cancel"}</button>
          <button onClick={handleSubmit} disabled={sending} style={{flex:2,padding:12,borderRadius:10,fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:13,letterSpacing:"0.5px",border:"none",background:(rating&&category&&message.trim())?"linear-gradient(135deg,#E8A830,#C88820)":"#3A3B3E",color:(rating&&category&&message.trim())?"#111213":"#7A7D85",opacity:(rating&&category&&message.trim())?1:0.5,cursor:(rating&&category&&message.trim())?"pointer":"not-allowed",transition:"all 0.2s"}}>{sending?"SENDING...":"SEND FEEDBACK"}</button>
        </div>
      </div>
    </div>
  );
}

// ── FeedbackInbox ─────────────────────────────────────────────────────────────
function FeedbackInbox({onClose}) {
  const entries=load(FEEDBACK_KEY,[]).reverse();
  const avgRating=entries.length?(entries.reduce((a,e)=>a+e.rating,0)/entries.length).toFixed(1):null;
  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-box">
        <button onClick={onClose} style={{background:"transparent",border:"none",color:"#E8A830",cursor:"pointer",fontFamily:"'Space Mono',monospace",fontSize:13,padding:"0 0 16px",letterSpacing:"0.5px"}}>← BACK</button>
        <h2 style={{fontSize:22,fontWeight:700,color:"#F0F0F0",marginBottom:4}}>Feedback Inbox</h2>
        <p style={{color:"#7A7D85",fontSize:12,fontFamily:"'Space Mono',monospace",marginBottom:16}}>{entries.length} response{entries.length!==1?"s":""}{avgRating?` · avg ${avgRating}★`:""}</p>
        {entries.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:12}}>No feedback yet.</div>}
        {entries.map(e=>(
          <div key={e.id} style={{background:"#111213",border:"1px solid #2A2B2E",borderRadius:10,padding:"14px 16px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
              <div><span style={{color:"#F0F0F0",fontWeight:700,fontSize:13}}>{e.name}</span><span style={{color:"#7A7D85",fontSize:10,fontFamily:"'Space Mono',monospace",display:"block",marginTop:2}}>{e.category}</span></div>
              <div style={{textAlign:"right"}}><div style={{color:"#E8A830",fontSize:13}}>{"⭐".repeat(e.rating)}</div><div style={{color:"#7A7D85",fontSize:10,fontFamily:"'Space Mono',monospace",marginTop:2}}>{new Date(e.ts).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div></div>
            </div>
            <p style={{color:"#C8C9CC",fontSize:13,lineHeight:1.6,margin:0}}>"{e.message}"</p>
          </div>
        ))}
      </div>
    </div>
  );
}


// ── ShareCard ─────────────────────────────────────────────────────────────────
function ShareCard({supplements,profile,logs,onClose}) {
  const canvasRef = useRef(null);
  const [generated,setGenerated] = useState(false);

  const streak = (() => {
    const dates = [...new Set(logs.map(l=>l.date))].sort();
    if(!dates.length) return 0;
    let s=1,i=dates.length-1;
    while(i>0){
      const a=new Date(dates[i]),b=new Date(dates[i-1]);
      a.setHours(0,0,0,0);b.setHours(0,0,0,0);
      if((a-b)/86400000===1){s++;i--;}else break;
    }
    return s;
  })();

  const daysOnStack = (() => {
    if(!logs.length) return 0;
    const first=new Date(Math.min(...logs.map(l=>l.ts)));
    const now=new Date();
    return Math.max(1,Math.round((now-first)/86400000));
  })();

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const W=canvas.width=800,H=canvas.height=500;
    const ctx=canvas.getContext("2d");

    // ── Background ──
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,"#0D1B2A");
    bg.addColorStop(1,"#080E14");
    ctx.fillStyle=bg;
    ctx.fillRect(0,0,W,H);

    // ── Diagonal accent lines ──
    ctx.save();
    const lg=ctx.createLinearGradient(0,0,W,0);
    lg.addColorStop(0,"rgba(232,168,48,0)");
    lg.addColorStop(0.5,"rgba(232,168,48,0.07)");
    lg.addColorStop(1,"rgba(232,168,48,0)");
    ctx.strokeStyle=lg;
    [[W+200,-100,-200,H+100,60],[W+300,-100,-100,H+100,30],[W+400,-100,0,H+100,15]].forEach(([x1,y1,x2,y2,w])=>{
      ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    });
    ctx.restore();

    // ── Top accent line ──
    const tl=ctx.createLinearGradient(0,0,W,0);
    tl.addColorStop(0,"rgba(232,168,48,0)");
    tl.addColorStop(0.3,"rgba(232,168,48,0.8)");
    tl.addColorStop(0.7,"rgba(232,168,48,0.8)");
    tl.addColorStop(1,"rgba(232,168,48,0)");
    ctx.strokeStyle=tl;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,3);ctx.lineTo(W,3);ctx.stroke();

    // ── Wordmark ──
    ctx.fillStyle="rgba(255,255,255,0.15)";
    ctx.font="700 13px -apple-system, Arial, sans-serif";
    ctx.letterSpacing="3px";
    ctx.fillText("SUPPSTACKD",48,52);

    // ── Name ──
    const name=profile?.name||"MY STACK";
    ctx.fillStyle="#F0F0F0";
    ctx.font="900 56px -apple-system, Arial, sans-serif";
    ctx.fillText(name.toUpperCase(),44,132);

    // ── Amber underline under name ──
    const nameW=ctx.measureText(name.toUpperCase()).width;
    const ul=ctx.createLinearGradient(44,0,44+Math.min(nameW,W-88),0);
    ul.addColorStop(0,"#E8A830");
    ul.addColorStop(1,"rgba(232,168,48,0.2)");
    ctx.strokeStyle=ul;ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(44,142);ctx.lineTo(44+Math.min(nameW,W-88),142);ctx.stroke();

    // ── Stats row ──
    const stats=[
      {label:"DAY STREAK",value:`${streak}`},
      {label:"DAYS ON STACK",value:`${daysOnStack}`},
      {label:"SUPPLEMENTS",value:`${supplements.length}`},
    ];
    stats.forEach((s,i)=>{
      const x=44+(i*180);
      ctx.fillStyle="#E8A830";
      ctx.font="700 28px -apple-system, Arial, sans-serif";
      ctx.fillText(s.value,x,196);
      ctx.fillStyle="rgba(255,255,255,0.35)";
      ctx.font="500 11px -apple-system, Arial, sans-serif";
      ctx.fillText(s.label,x,214);
    });

    // ── Divider ──
    ctx.strokeStyle="rgba(255,255,255,0.08)";ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(44,232);ctx.lineTo(W-44,232);ctx.stroke();

    // ── Supplement pills ──
    let px=44,py=260;
    const pillH=38,pillPad=16,fontSize=12,gap=10;
    ctx.font=`700 ${fontSize}px -apple-system, Arial, sans-serif`;

    supplements.slice(0,8).forEach(s=>{
      const label=s.name.toUpperCase();
      const sub=s.brand?s.brand.toUpperCase():"";
      ctx.font=`700 ${fontSize}px -apple-system, Arial, sans-serif`;
      const textW=ctx.measureText(label).width;
      ctx.font=`500 ${fontSize-1}px -apple-system, Arial, sans-serif`;
      const subW=sub?ctx.measureText(sub).width:0;
      ctx.font=`700 ${fontSize}px -apple-system, Arial, sans-serif`;
      const pillW=textW+(pillPad*2)+(sub?subW+16:0);

      if(px+pillW>W-44){px=44;py+=pillH+gap;}

      // pill bg
      ctx.fillStyle="rgba(255,255,255,0.06)";
      ctx.beginPath();
      ctx.roundRect(px,py,pillW,pillH,6);
      ctx.fill();

      // pill border
      ctx.strokeStyle="rgba(232,168,48,0.25)";ctx.lineWidth=1;
      ctx.beginPath();
      ctx.roundRect(px,py,pillW,pillH,6);
      ctx.stroke();

      // pill text
      ctx.fillStyle="#F0F0F0";
      ctx.font=`700 ${fontSize}px -apple-system, Arial, sans-serif`;
      ctx.fillText(label,px+pillPad,py+pillH/2+4);

      if(sub){
        ctx.fillStyle="rgba(232,168,48,0.7)";
        ctx.font=`500 ${fontSize-1}px -apple-system, Arial, sans-serif`;
        ctx.fillText(sub,px+pillPad+ctx.measureText(label).width+8+pillPad-8,py+pillH/2+4);
      }

      px+=pillW+gap;
    });

    if(supplements.length>8){
      ctx.fillStyle="rgba(255,255,255,0.3)";
      ctx.font="500 12px -apple-system, Arial, sans-serif";
      ctx.fillText(`+${supplements.length-8} more`,px,py+pillH/2+4);
    }

    // ── Bottom date ──
    const dateStr=new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}).toUpperCase();
    ctx.fillStyle="rgba(255,255,255,0.2)";
    ctx.font="500 11px -apple-system, Arial, sans-serif";
    ctx.fillText(dateStr,44,H-28);

    // ── Bottom right branding ──
    ctx.fillStyle="rgba(232,168,48,0.5)";
    ctx.font="700 11px -apple-system, Arial, sans-serif";
    const brand="SUPPSTACKD.NETLIFY.APP";
    const bw=ctx.measureText(brand).width;
    ctx.fillText(brand,W-44-bw,H-28);

    setGenerated(true);
  },[]);

  const [sharing, setSharing] = useState(false);

  const shareToPhotos = async () => {
    setSharing(true);
    const canvas = canvasRef.current;
    try {
      // Convert canvas to blob
      const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/png"));
      const file = new File([blob], "my-stack.png", { type: "image/png" });

      // Try native Web Share API first (iOS + Android → goes to Photos/Gallery)
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({
          files: [file],
          title: "My Supplement Stack",
        });
      } else if (navigator.share) {
        // Fallback: share without files (some older browsers)
        const url = canvas.toDataURL("image/png");
        await navigator.share({ title: "My Supplement Stack", url });
      } else {
        // Desktop fallback: trigger download
        const a = document.createElement("a");
        a.download = "my-stack.png";
        a.href = canvas.toDataURL("image/png");
        a.click();
      }
    } catch(e) {
      // User cancelled or share failed — silent fallback to download
      if (e.name !== "AbortError") {
        const a = document.createElement("a");
        a.download = "my-stack.png";
        a.href = canvas.toDataURL("image/png");
        a.click();
      }
    }
    setSharing(false);
  };

  const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
  const canNativeShare = typeof navigator.share !== "undefined";

  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-box" style={{maxWidth:480}}>
        <h2 style={{fontSize:22,fontWeight:700,color:"#F0F0F0",marginBottom:4}}>Your Stack Card</h2>
        <p style={{color:"#7A7D85",fontSize:12,fontFamily:"'Space Mono',monospace",marginBottom:18,lineHeight:1.6}}>Share your stack on Instagram, WhatsApp or anywhere.</p>

        <div style={{borderRadius:12,overflow:"hidden",marginBottom:18,border:"1px solid #2A2B2E"}}>
          <canvas ref={canvasRef} style={{width:"100%",height:"auto",display:"block"}}/>
        </div>

        <div className="flex gap-10">
          <button className="btn-cancel flex-1" onClick={onClose}>Close</button>
          <button className="btn-primary" style={{flex:2,opacity:sharing?0.6:1}} onClick={shareToPhotos} disabled={sharing}>
            {sharing ? "SHARING..." : canNativeShare ? "SAVE / SHARE" : "DOWNLOAD"}
          </button>
        </div>
      </div>
    </div>
  );
}



// ── BatchLogModal ─────────────────────────────────────────────────────────────
function BatchLogModal({supplements, logs, todayFeel, onClose, onSaveAll}) {
  const unlogged = supplements.filter(s => s.lastLogged !== today()).sort((a,b)=>a.name.localeCompare(b.name));
  const alreadyLogged = supplements.filter(s => s.lastLogged === today());

  // Build initial rows — one per unlogged supplement
  const [rows, setRows] = useState(() =>
    unlogged.map(s => ({
      suppId: s.id,
      name: s.name,
      unit: s.unit,
      servingSize: s.servingSize,
      taken: true,
      amount: s.servingSize,
      notes: "",
    }))
  );

  // Feel — ask once at top, applies to all
  const isFirstLog = !todayFeel;
  const [feel, setFeel] = useState(todayFeel || {energy:null,recovery:null,mood:null,sleep:null});
  const [feelChanged, setFeelChanged] = useState(false);

  const updateRow = (suppId, field, value) => {
    setRows(prev => prev.map(r => r.suppId === suppId ? {...r, [field]: value} : r));
  };

  const handleSaveAll = () => {
    onSaveAll(rows, feel);
  };

  const allSkipped = rows.every(r => !r.taken);

  return (
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-box" style={{padding:"18px 20px",maxHeight:"88vh",overflowY:"auto"}}>

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <h2 style={{fontSize:19,fontWeight:700,color:"#F0F0F0",margin:0}}>Log Today</h2>
            <p style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:10,margin:"3px 0 0"}}>
              {new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})}
            </p>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:20,fontWeight:700,color:"#E8A830",lineHeight:1}}>✕</button>
        </div>

        {/* Already logged chips */}
        {alreadyLogged.length > 0 && (
          <div style={{marginBottom:12}}>
            <span style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:9,letterSpacing:"1.5px",display:"block",marginBottom:6}}>ALREADY LOGGED TODAY</span>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {alreadyLogged.map(s=>(
                <div key={s.id} style={{background:"rgba(91,173,114,0.1)",border:"1px solid rgba(91,173,114,0.25)",borderRadius:20,padding:"4px 10px"}}>
                  <span style={{color:"#5BAD72",fontFamily:"'Space Mono',monospace",fontSize:10}}>✓ {s.name}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {unlogged.length === 0 ? (
          <div style={{textAlign:"center",padding:"30px 0"}}>
            <p style={{color:"#5BAD72",fontFamily:"'Space Mono',monospace",fontSize:13,fontWeight:700,marginBottom:6}}>ALL LOGGED ✓</p>
            <p style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:11}}>You've logged everything for today.</p>
            <button onClick={onClose} className="btn-primary" style={{marginTop:16,padding:"10px 24px"}}>DONE</button>
          </div>
        ) : (
          <>
            {/* Supplement rows */}
            <div style={{marginBottom:12}}>
              <span style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:9,letterSpacing:"1.5px",display:"block",marginBottom:6}}>TO LOG</span>
              <div style={{maxHeight:168,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
              {rows.map((row, i) => (
                <div key={row.suppId} style={{
                  background: row.taken ? "#1C1D1F" : "#111213",
                  border: row.taken ? "1px solid #2A2B2E" : "1px solid #1C1D1F",
                  borderLeft: `3px solid ${row.taken ? "#E8A830" : "#3A3B3E"}`,
                  borderRadius:8, padding:"7px 10px", marginBottom:5,
                  transition:"all 0.15s"
                }}>
                  {/* Compact single row: name | stepper | taken/skip */}
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{color: row.taken ? "#F0F0F0" : "#4A4B4F",fontWeight:700,fontSize:12,flex:1,minWidth:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{row.name}</span>
                    {row.taken && <>
                      <button onClick={()=>updateRow(row.suppId,"amount",Math.max(0,row.amount-row.servingSize))}
                        style={{width:22,height:22,borderRadius:5,border:"1px solid #2A2B2E",background:"#111213",color:"#F0F0F0",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,lineHeight:1}}>−</button>
                      <span style={{color:"#E8A830",fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:11,minWidth:36,textAlign:"center",flexShrink:0}}>{row.amount}{row.unit}</span>
                      <button onClick={()=>updateRow(row.suppId,"amount",row.amount+row.servingSize)}
                        style={{width:22,height:22,borderRadius:5,border:"1px solid #2A2B2E",background:"#111213",color:"#F0F0F0",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,lineHeight:1}}>+</button>
                    </>}
                    <button onClick={()=>updateRow(row.suppId,"taken",!row.taken)}
                      style={{padding:"3px 8px",borderRadius:5,fontFamily:"'Space Mono',monospace",fontSize:9,fontWeight:700,cursor:"pointer",border:row.taken?"1px solid #5BAD72":"1px solid #C0392B",background:row.taken?"rgba(91,173,114,0.12)":"rgba(192,57,43,0.08)",color:row.taken?"#5BAD72":"#C0392B",flexShrink:0,transition:"all 0.12s"}}>
                      {row.taken?"TAKEN":"SKIP"}
                    </button>
                  </div>
                </div>
              ))}
            </div></div>

            {/* Feel section — once for all */}
            {!allSkipped && (
              <div style={{marginBottom:14}}>
                <span style={{color:"#7A7D85",fontFamily:"'Space Mono',monospace",fontSize:9,letterSpacing:"1.5px",display:"block",marginBottom:8}}>HOW ARE YOU FEELING?</span>
